---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: docker-mailserver

resources:
  - ../../base

configMapGenerator:
  - name: docker-mailserver-helm-values
    behavior: merge
    files:
      - overlay-values.yaml=values.yaml

patches:
  - target:
      group: helm.toolkit.fluxcd.io
      kind: HelmRelease
      name: docker-mailserver
    path: helm-patch.yaml
