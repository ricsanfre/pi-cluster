apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: opentelemetry-demo-apm
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: OpenTelemetry Demo
  configMapRef:
    name: opentelemetry-demo-apm-dashboard
    key: apm-dashboard.json