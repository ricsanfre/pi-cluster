---
# Non-sensitive configuration for product-service.
# MONGODB_URI (contains credentials) is injected via product-service-mongodb-secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-service-config
data:
  SERVER_PORT: "8081"
  # Keycloak OIDC
  KEYCLOAK_URL: "https://iam.${CLUSTER_DOMAIN}"
  KEYCLOAK_INTERNAL_URL: "http://keycloak-service.keycloak.svc.cluster.local:8080"
  KEYCLOAK_REALM: "e-commerce"
  # OpenTelemetry Collector
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.otel.svc.cluster.local:4318"
  OTEL_SERVICE_NAME: "product-service"
