# ExternalSecrets — e-commerce Keycloak realm (e-commerce namespace)
# Provides placeholder values for the KeycloakRealmImport CR.
# Client secrets and test user passwords for the e-commerce realm.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-realm-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-realm-secrets
    creationPolicy: Owner
  data:
    # Client secrets
    - secretKey: KC_CLIENT_ECOMMERCE_WEB
      remoteRef:
        key: /e-commerce/keycloak/clients/e-commerce-web
        property: CLIENT_SECRET
    - secretKey: KC_CLIENT_CART_SERVICE
      remoteRef:
        key: /e-commerce/keycloak/clients/cart-service
        property: CLIENT_SECRET
    - secretKey: KC_CLIENT_ORDER_SERVICE
      remoteRef:
        key: /e-commerce/keycloak/clients/order-service
        property: CLIENT_SECRET
    - secretKey: KC_CLIENT_REVIEWS_SERVICE
      remoteRef:
        key: /e-commerce/keycloak/clients/reviews-service
        property: CLIENT_SECRET
    - secretKey: KC_CLIENT_PRODUCT_SERVICE
      remoteRef:
        key: /e-commerce/keycloak/clients/product-service
        property: CLIENT_SECRET
    - secretKey: KC_CLIENT_USER_SERVICE
      remoteRef:
        key: /e-commerce/keycloak/clients/user-service
        property: CLIENT_SECRET
    - secretKey: KC_CLIENT_NOTIFICATION_SERVICE
      remoteRef:
        key: /e-commerce/keycloak/clients/notification-service
        property: CLIENT_SECRET
    # User passwords
    - secretKey: KC_USER_TESTUSER_PASSWORD
      remoteRef:
        key: /e-commerce/keycloak/users/testuser
        property: password
    - secretKey: KC_USER_OTHERUSER_PASSWORD
      remoteRef:
        key: /e-commerce/keycloak/users/otheruser
        property: password
    - secretKey: KC_USER_ADMINUSER_PASSWORD
      remoteRef:
        key: /e-commerce/keycloak/users/adminuser
        property: password
