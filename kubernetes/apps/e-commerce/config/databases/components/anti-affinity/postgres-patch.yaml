apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-ecommerce
spec:
  affinity:
    enablePodAntiAffinity: true
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
