# GrafanaDashboard — MongoDB Performance Overview
# Uses the official MongoDB Ops Manager dashboard JSON, which matches
# the automation agent metric format (mongodb_connections_*, mongodb_asserts_*,
# mongodb_wiredTiger_*, mongodb_members_*, etc.).
# The dashboard JSON is stored in a ConfigMap (mongodb-grafana-dashboard)
# in the databases namespace.
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: mongodb
spec:
  allowCrossNamespaceImport: true
  folder: Databases
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  configMapRef:
    name: mongodb-grafana-dashboard-metrics
    key: mongodb-metrics.json
