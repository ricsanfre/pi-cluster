# GrafanaDashboard — MongoDB Monitoring
# Uses the official MongoDB Atlas sample dashboard which matches
# the automation agent metric format (mongodb_connections_*,
# mongodb_asserts_*, mongodb_wiredTiger_*, mongodb_members_*, etc.).
# Some panels may not populate if the metric name or label differs
# slightly from the Atlas agent format.
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: mongodb
spec:
  allowCrossNamespaceImport: true
  folder: Databases
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  url: https://raw.githubusercontent.com/mongodb/mongodb-atlas-kubernetes/main/docs/grafana/sample_dashboard.json
