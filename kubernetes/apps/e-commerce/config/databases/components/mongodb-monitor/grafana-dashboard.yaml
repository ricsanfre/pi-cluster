# GrafanaDashboard — MongoDB Overview (Percona, ID 20192)
# Compatible with the MongoDB Community Operator's built-in metrics
# endpoint (mongodb-agent, port 9216).
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: mongodb
spec:
  allowCrossNamespaceImport: true
  folder: Databases
  instanceSelector:
    matchLabels:
      dashboards: grafana
  grafanaCom:
    id: 20192
    revision: 2
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
