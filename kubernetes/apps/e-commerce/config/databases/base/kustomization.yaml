apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# E-commerce databases — per-application database clusters.
# PostgreSQL (CNPG), MongoDB, and Valkey for e-commerce services.
namespace: databases
resources:
  - postgres-cluster.yaml
  - postgres-databases.yaml
  - postgres-externalsecrets.yaml
  - mongodb-community.yaml
  - mongodb-externalsecrets.yaml
  - valkey-cluster.yaml
  - valkey-externalsecrets.yaml
