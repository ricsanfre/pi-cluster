# PeerAuthentication — PERMISSIVE mTLS for CloudNative-PG metrics port
# The databases-strict policy enforces STRICT mTLS on all pods in the
# databases namespace (Istio ambient mesh). Prometheus scrapes from outside
# the mesh without a mesh identity, so STRICT mode blocks the scrape.
# This port-level PERMISSIVE exception follows the same pattern as
# cnpg-webhook-permissive (port 9443, created by the CNPG operator).
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: cnpg-metrics-permissive
  namespace: databases
spec:
  portLevelMtls:
    "9187":
      mode: PERMISSIVE
  selector:
    matchLabels:
      cnpg.io/cluster: postgres-ecommerce
