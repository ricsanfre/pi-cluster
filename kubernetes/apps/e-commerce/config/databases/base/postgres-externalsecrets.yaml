# ExternalSecrets — E-commerce PostgreSQL (databases namespace)
# Backed by Vault via ClusterSecretStore 'vault-backend'.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: users-db-externalsecret
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: users-db-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /e-commerce/databases/postgresql/users-db
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: orders-db-externalsecret
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: orders-db-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /e-commerce/databases/postgresql/orders-db
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-ecommerce-s3-externalsecret
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-ecommerce-s3-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        AWS_ENDPOINTS: "https://${S3_SERVER}:9091"
        AWS_ACCESS_KEY_ID: "{{ .user | toString }}"
        AWS_SECRET_ACCESS_KEY: "{{ .key | toString }}"
  data:
    - secretKey: user
      remoteRef:
        key: s3/barman
        property: username
    - secretKey: key
      remoteRef:
        key: s3/barman
        property: key
