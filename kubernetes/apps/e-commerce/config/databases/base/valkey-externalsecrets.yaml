# ExternalSecrets — Valkey (databases namespace)
# Backed by Vault via ClusterSecretStore 'vault-backend'.
# Secrets created:
#   valkey-passwords  ← cart-service Valkey password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: valkey-passwords-externalsecret
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: valkey-passwords
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /e-commerce/databases/valkey/cart-service