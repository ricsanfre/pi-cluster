# CloudNativePG — E-commerce PostgreSQL Cluster
# Namespace: databases
# 2 instances (1 primary + 1 replica), 512Mi memory limit per pod.
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-ecommerce
  namespace: databases
spec:
  instances: 2

  imageName: ghcr.io/cloudnative-pg/postgresql:18.4

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  postgresql:
    parameters:
      shared_buffers: "64MB"
      max_connections: "100"

  bootstrap:
    initdb: {}

  storage:
    size: 10Gi
    storageClass: longhorn

  monitoring:
    enablePodMonitor: true

  backup:
    barmanObjectStore:
      data:
        compression: bzip2
      wal:
        compression: bzip2
        maxParallel: 8
      destinationPath: s3://k3s-barman/postgres-ecommerce
      endpointURL: https://${S3_SERVER}:9091
      s3Credentials:
        accessKeyId:
          name: postgres-ecommerce-s3-secret
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: postgres-ecommerce-s3-secret
          key: AWS_SECRET_ACCESS_KEY
    retentionPolicy: "30d"

  managed:
    roles:
      - name: users_owner
        ensure: present
        login: true
        inherit: true
        passwordSecret:
          name: users-db-secret
      - name: orders_owner
        ensure: present
        login: true
        inherit: true
        passwordSecret:
          name: orders-db-secret
