# ExternalSecrets — e-commerce Kafka users (kafka namespace)
# Provisions: *-kafka-secret secrets for Strimzi KafkaUser CRs.
# The same Vault paths are also synced to the e-commerce namespace
# so Spring Boot services can authenticate.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: order-service-kafka-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: order-service-kafka-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: kafka/order-service
        property: username
    - secretKey: password
      remoteRef:
        key: kafka/order-service
        property: password
