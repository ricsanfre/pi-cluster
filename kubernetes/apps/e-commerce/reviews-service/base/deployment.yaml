---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviews-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reviews-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reviews-service
        app.kubernetes.io/part-of: e-commerce
    spec:
      serviceAccountName: reviews-service

      containers:
        - name: reviews-service
          image: ghcr.io/ricsanfre/spring-microservices-otel-k8s/reviews-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP

          envFrom:
            - configMapRef:
                name: reviews-service-config

          env:
            # MongoDB URI from secret (contains credentials)
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: reviews-service-mongodb-secret
                  key: MONGODB_URI
            # OAuth2 client credential for calling user-service, product-service, order-service
            - name: REVIEWS_SERVICE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: reviews-service-oauth-secret
                  key: REVIEWS_SERVICE_CLIENT_SECRET

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
