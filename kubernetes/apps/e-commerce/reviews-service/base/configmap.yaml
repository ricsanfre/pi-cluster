---
# Non-sensitive configuration for reviews-service.
# MONGODB_URI (contains credentials) is injected via reviews-service-mongodb-secret.
# REVIEWS_SERVICE_CLIENT_SECRET is injected via reviews-service-oauth-secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: reviews-service-config
data:
  SERVER_PORT: "8083"
  # Keycloak OIDC
  KEYCLOAK_URL: "https://keycloak.${CLUSTER_DOMAIN}"
  KEYCLOAK_INTERNAL_URL: "http://keycloak-service.keycloak.svc.cluster.local:8080"
  KEYCLOAK_REALM: "e-commerce"
  # Downstream service URLs (plain Kubernetes DNS — ADR-002)
  USER_SERVICE_URL: "http://user-service.e-commerce.svc.cluster.local:8085"
  PRODUCT_SERVICE_URL: "http://product-service.e-commerce.svc.cluster.local:8081"
  ORDER_SERVICE_URL: "http://order-service.e-commerce.svc.cluster.local:8082"
  # OpenTelemetry Collector
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.otel.svc.cluster.local:4318"
  OTEL_SERVICE_NAME: "reviews-service"
