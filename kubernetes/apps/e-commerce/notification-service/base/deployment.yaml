---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-service
        app.kubernetes.io/part-of: e-commerce
    spec:
      serviceAccountName: notification-service

      containers:
        - name: notification-service
          image: ghcr.io/ricsanfre/spring-microservices-otel-k8s/notification-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP

          envFrom:
            - configMapRef:
                name: notification-service-config

          env:
            # Kafka SCRAM-SHA-512 password (Strimzi generates and stores in kafka namespace;
            # copy to e-commerce namespace as notification-service-kafka-secret before deploying).
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-service-kafka-secret
                  key: password

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: "10m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
