# ExternalSecrets — cart-service (e-commerce namespace)
# Provisions: cart-service-oauth-secret, cart-service-kafka-secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cart-service-oauth-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cart-service-oauth-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /e-commerce/keycloak/clients/cart-service
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cart-service-kafka-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cart-service-kafka-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /kafka/cart-service
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cart-service-valkey-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cart-service-valkey-secret
    creationPolicy: Owner
  data:
    - secretKey: VALKEY_PASSWORD
      remoteRef:
        key: /e-commerce/databases/valkey/cart-service
        property: password
