# ExternalSecret — frontend-service (e-commerce namespace)
# Provisions: AUTH_SECRET, AUTH_KEYCLOAK_SECRET
# AUTH_KEYCLOAK_SECRET is sourced from the Keycloak e-commerce-web client
# path to ensure it matches the secret imported into the Keycloak realm.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frontend-service-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: frontend-service-secret
    creationPolicy: Owner
  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: /e-commerce/frontend-service
        property: AUTH_SECRET
    - secretKey: AUTH_KEYCLOAK_SECRET
      remoteRef:
        key: /e-commerce/keycloak/clients/e-commerce-web
        property: CLIENT_SECRET
