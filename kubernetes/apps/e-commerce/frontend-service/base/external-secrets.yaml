# ExternalSecret — frontend-service (e-commerce namespace)
# Provisions: AUTH_SECRET, AUTH_KEYCLOAK_SECRET
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frontend-service-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: frontend-service-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /e-commerce/frontend-service
