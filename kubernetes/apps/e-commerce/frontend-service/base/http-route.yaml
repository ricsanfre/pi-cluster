# ── frontend-service ───────────────────────────────────────────────────────
# Next.js BFF — serves the web app and handles OIDC callbacks.
# No JWT SecurityPolicy — authentication is via browser session cookies managed by Auth.js.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-service
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "app.${CLUSTER_DOMAIN}"
  rules:
    - backendRefs:
        - name: frontend-service
          port: 3000