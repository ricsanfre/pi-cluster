---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway-app
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: envoy-gateway-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/platform/envoy-gateway/app/overlays/prod
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway-config
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: envoy-gateway-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: envoy-gateway-app
    - name: cert-manager-config
  path: ./kubernetes/platform/envoy-gateway/config/overlays/prod
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
