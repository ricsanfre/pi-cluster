---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: keycloak-operator
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: keycloak
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/platform/keycloak/operator/overlays/prod
  dependsOn:
    - name: istio-app
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: keycloak-database
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: databases
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cloudnative-pg-app
    - name: external-secrets-config
  path: ./kubernetes/platform/keycloak/database/overlays/prod
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: keycloak-app
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: keycloak
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: keycloak-database
    - name: keycloak-operator
  path: ./kubernetes/platform/keycloak/app/overlays/prod
  prune: true
  wait: true
  healthCheckExprs:
    - apiVersion: k8s.keycloak.org/v2beta1
      kind: Keycloak
      inProgress: "!status.conditions.exists(c, c.type == 'Ready') || status.conditions.filter(c, c.type == 'Ready').all(c, c.status == 'False')"
      current: status.conditions.exists(e, e.type == 'Ready') && status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings


---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: keycloak-config
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: keycloak-app
  path: ./kubernetes/platform/keycloak/config/overlays/prod
  prune: true
  wait: true
  healthCheckExprs:
    - apiVersion: infra.contrib.fluxcd.io/v1alpha2
      kind: Terraform
      inProgress: "!status.conditions.exists(c, c.type == 'Ready') || status.conditions.filter(c, c.type == 'Ready').all(c, c.status == 'False')"
      current: status.conditions.exists(e, e.type == 'Ready') && status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
