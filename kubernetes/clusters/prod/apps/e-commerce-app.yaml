---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: e-commerce-databases
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: databases
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cloudnative-pg-app
    - name: mongodb-community-operator-app
