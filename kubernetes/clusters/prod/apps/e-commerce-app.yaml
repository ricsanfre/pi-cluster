---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: e-commerce-keycloak
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: keycloak
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: keycloak-app
    - name: external-secrets-config
  path: ./kubernetes/apps/e-commerce/config/keycloak/overlays/prod
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: e-commerce-kafka
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: kafka
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: keycloak-config
    - name: kafka-cluster-app
  path: ./kubernetes/apps/e-commerce/config/kafka/overlays/prod
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
