# Add Istio ambient mesh label to the databases namespace.
# Enables ztunnel L4 traffic interception and transparent mTLS for this namespace.
# A PERMISSIVE PeerAuthentication ensures non-mesh clients (kube-apiserver
# webhook calls, CNPG health checks) can connect without SPIFFE identity.
# See: design/adr/0003-ambient-mesh-exclusions.md (resolution section)
apiVersion: v1
kind: Namespace
metadata:
  name: databases
  labels:
    istio.io/dataplane-mode: ambient
