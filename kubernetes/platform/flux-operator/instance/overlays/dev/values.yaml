# flux-instance helm values (dev overlay)
instance:
  sync:
    kind: GitRepository
    url: https://github.com/ricsanfre/pi-cluster
    ref: refs/heads/master
    path: kubernetes/cluster/dev
    interval: 1h
    ignore: |
      /ansible/
      /ansible-runner/
      /design/
      /docs/
      /metal/
      /test/