apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fluentd-externalsecret
  namespace: fluent
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: fluentd-secrets
  data:
  - secretKey: fluentd-shared-key
    remoteRef:
      key: fluent/shared-key
      property: shared-key
  - secretKey: es-username
    remoteRef:
      key: elastic/fluentd
      property: username
  - secretKey: es-password
    remoteRef:
      key: elastic/fluentd
      property: password     
