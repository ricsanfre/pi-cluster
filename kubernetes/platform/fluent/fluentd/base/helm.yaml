---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: fluent
spec:
  url: https://fluent.github.io/helm-charts
  interval: 1h
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluentd
spec:
  interval: 30m
  chart:
    spec:
      chart: fluentd
      version: 0.5.3
      sourceRef:
        kind: HelmRepository
        name: fluent
  releaseName: fluentd
  targetNamespace: fluent
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
  - kind: ConfigMap
    name: fluentd-helm-values
    valuesKey: base-values.yaml