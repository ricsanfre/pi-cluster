---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: fluent
spec:
  interval: 1h
  url: oci://ghcr.io/fluent/helm-charts/fluent-bit
  ref:
    tag: 0.57.2
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: fluent
  releaseName: fluent-bit
  targetNamespace: fluent
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
  - kind: ConfigMap
    name: fluent-bit-helm-values
    valuesKey: base-values.yaml