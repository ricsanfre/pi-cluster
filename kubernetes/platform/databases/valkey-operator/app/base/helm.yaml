---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: valkey
spec:
  url: https://valkey.io/valkey-helm/
  interval: 1h
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: valkey-operator
      version: 0.2.0
      sourceRef:
        kind: HelmRepository
        name: valkey
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
  - kind: ConfigMap
    name: valkey-operator-helm-values
    valuesKey: base-values.yaml