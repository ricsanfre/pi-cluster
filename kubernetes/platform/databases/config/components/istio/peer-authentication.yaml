# Istio PeerAuthentication — databases namespace
# STRICT mTLS for all traffic by default — ztunnel enforces SPIFFE identity.
# Port 9443 (CNPG admission webhook) is PERMISSIVE: the kube-apiserver
# calls this webhook from outside the mesh and lacks a SPIFFE identity.
# CNPG health checks and replication (port 8000) stay STRICT — the CNPG
# operator runs in the databases namespace with a mesh identity.
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: databases-strict
  namespace: databases
spec:
  selector:
    matchLabels: {}
  mtls:
    mode: STRICT
  portLevelMtls:
    "9443":
      mode: PERMISSIVE
