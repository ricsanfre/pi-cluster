# ExternalSecrets — PostgreSQL (databases namespace)
# Backed by Vault via ClusterSecretStore 'vault-backend'.
# Secrets created:
#   postgres-superuser-secret  ← CNPG bootstrap admin (superuser)
#   users-db-secret            ← user-service DB owner
#   orders-db-secret           ← order-service DB owner
#   keycloak-db-secret         ← keycloak DB owner
#   postgres-minio-secret      ← S3 backup credentials (MinIO)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-superuser-externalsecret
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-superuser-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /e-commerce/databases/postgresql/superuser
---
