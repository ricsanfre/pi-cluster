# Istio PeerAuthentication — databases namespace
# Requires all traffic in the databases namespace to use mTLS (STRICT mode).
# Works with Istio ambient mode: ztunnel enforces mTLS at L4.
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: databases-strict
  namespace: databases
spec:
  mtls:
    mode: STRICT