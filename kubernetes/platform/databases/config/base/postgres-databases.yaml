# CloudNativePG — per-service Database CRs
# Each service gets its own database owned by a dedicated role.
# Roles are managed by the CNPG Cluster (see postgres-cluster.yaml).
---
# ── user-service database ──────────────────────────────────────────────────
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: users-db
  namespace: databases
spec:
  name: users
  owner: users_owner
  cluster:
    name: postgres
---
# ── order-service database ─────────────────────────────────────────────────
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: orders-db
  namespace: databases
spec:
  name: orders
  owner: orders_owner
  cluster:
    name: postgres
---
# ── keycloak database ──────────────────────────────────────────────────────
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: keycloak-db
  namespace: databases
spec:
  name: keycloak
  owner: keycloak_owner
  cluster:
    name: postgres