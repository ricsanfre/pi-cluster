apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: elasticsearch-admin-externalsecret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: es-admin-user-file-realm
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "{{ .username | toString }}"
        password: "{{ .password | toString }}"
        roles: superuser
  data:
  - secretKey: username
    remoteRef:
      key: elastic/admin
      property: username
  - secretKey: password
    remoteRef:
      key: elastic/admin
      property: password
