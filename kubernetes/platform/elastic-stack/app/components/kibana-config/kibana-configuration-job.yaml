---
apiVersion: batch/v1
kind: Job
metadata:
  name: kibana-config-job
spec:
  ttlSecondsAfterFinished: 3600 # Delete the job once done, if needed 1h to inspect logs
  parallelism: 1
  completions: 1
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-kibana
          # renovate: datasource=github-releases depName=curl/curl-container
          image: alpine/curl:8.17.0
          imagePullPolicy: IfNotPresent
          env:
            - name: KIBANA_URL
              value: efk-kb-http
            - name: KIBANA_PORT
              value: "5601"
          command:
            - /bin/sh
            - /kibana/wait-for-kibana.sh
          volumeMounts:
            - name: kibana-config-data
              mountPath: /kibana/
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          resources:
            requests:
              cpu: 1m
              memory: 128Mi
            limits:
              memory: 128Mi
      containers:
        - name: kibana-config-job
         # renovate: datasource=github-releases depName=curl/curl-container
          image: alpine/curl:8.17.0
          env:
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: efk-es-elastic-user
                  key: elastic
            - name: KIBANA_URL
              value: efk-kb-http
            - name: KIBANA_PORT
              value: "5601"
          command:
            - /bin/sh
            - /kibana/create-data-view.sh
          volumeMounts:
            - name: kibana-config-data
              mountPath: /kibana/
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          resources:
            requests:
              cpu: 1m
              memory: 128Mi
            limits:
              memory: 128Mi
      volumes:
        - name: kibana-config-data
          configMap:
            name: kibana-config-data
            defaultMode: 0777 # yamllint disable-line rule:octal-values
