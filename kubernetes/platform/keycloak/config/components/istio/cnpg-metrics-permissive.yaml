# PeerAuthentication — PERMISSIVE mTLS for Keycloak CNPG metrics port
# The databases-strict policy enforces STRICT mTLS on all pods in the
# databases namespace (Istio ambient mesh). Prometheus scrapes from outside
# the mesh without a mesh identity, so STRICT mode blocks the scrape.
# This port-level PERMISSIVE exception targets the Keycloak PostgreSQL
# cluster specifically.
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: postgres-keycloak-metrics-permissive
  namespace: databases
spec:
  portLevelMtls:
    "9187":
      mode: PERMISSIVE
  selector:
    matchLabels:
      cnpg.io/cluster: postgres-keycloak
