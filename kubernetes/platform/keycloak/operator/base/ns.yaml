apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
  # Ambient mesh intentionally NOT enabled on this namespace.
  # Keycloak's JGroups clustering (Infinispan distributed cache) uses custom
  # TCP binary protocols with timing-sensitive failure detection (FD). ztunnel
  # HBONE encapsulation adds latency and interferes with JGroups heartbeat
  # mechanisms, causing false failure detection and broken cluster formation.
  # Additionally, the Terraform runner in flux-system (outside the mesh) cannot
  # connect to Keycloak's HTTP API when STRICT mTLS is enforced. Since Istio
  # ambient mesh lacks per-port bypass annotations (istio/istio#58546), the only
  # reliable option is to exclude the entire namespace from the mesh.
  # See: design/adr/0003-ambient-mesh-exclusions.md