# ExternalSecrets — Keycloak PostgreSQL (databases namespace)
# Backed by Vault via ClusterSecretStore 'vault-backend'.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-db-externalsecret
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-db-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /keycloak/database/keycloak-db
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-keycloak-minio-externalsecret
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-keycloak-minio-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        AWS_ENDPOINTS: "https://${S3_SERVER}:9091"
        AWS_ACCESS_KEY_ID: "{{ .user | toString }}"
        AWS_SECRET_ACCESS_KEY: "{{ .key | toString }}"
  data:
    - secretKey: user
      remoteRef:
        key: minio/barman
        property: username
    - secretKey: key
      remoteRef:
        key: minio/barman
        property: key
