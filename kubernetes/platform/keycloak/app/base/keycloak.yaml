apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
spec:
  # Number of instances in the cluster
  instances: 2
  # External Database connection — dedicated CNPG cluster (postgres-keycloak)
  db:
    vendor: postgres
    host: postgres-keycloak-rw.databases.svc.cluster.local
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  # Bootstrap admin account
  bootstrapAdmin:
    user:
      secret: keycloak-secret
  # Enabling HTTP communications
  # Keycloak behind HTTP Proxy closing TLS connections
  http:
    httpEnabled: true
  hostname:
    # Setting hostname
    hostname: https://iam.${CLUSTER_DOMAIN}
    strict: true
    # Enabling back channel
    backchannelDynamic: true
  proxy:
    headers: xforwarded # double check your reverse proxy sets and overwrites the X-Forwarded-* headers
  # Do not create ingress
  # TLS options are not supported. Ingress resource to be created separately.
  ingress:
    enabled: false
  # Resource limits — override operator default (1700Mi request, 2Gi limit)
  # Actual usage: ~750-900Mi per instance
  resources:
    requests:
      cpu: 100m
      memory: "900Mi"
    limits:
      cpu: 2000m
      memory: "1200Mi"
  # Additional Options
  additionalOptions:
    # Enable health check endpoints (/health, /health/ready, /health/live)
    - name: health-enabled
      value: "true"
