apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-externalsecret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-secret
  data:
    - secretKey: password
      remoteRef:
        key: keycloak/admin
        property: password
    - secretKey: username
      remoteRef:
        key: keycloak/admin
        property: username
---
# DB credentials synced from the databases namespace (shared CNPG cluster).
# The CNPG managed role keycloak_owner owns the keycloak database.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-db-externalsecret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-db-secret
  dataFrom:
    - extract:
        key: /keycloak/database/keycloak-db