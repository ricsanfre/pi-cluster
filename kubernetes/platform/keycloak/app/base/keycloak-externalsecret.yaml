apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-externalsecret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-secret
  data:
    - secretKey: password
      remoteRef:
        key: keycloak/admin
        property: password
    - secretKey: username
      remoteRef:
        key: keycloak/admin
        property: username
---
# DB credentials synced from the databases namespace (shared CNPG cluster).
# The CNPG managed role keycloak_owner owns the keycloak database.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-db-externalsecret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-db-secret
  dataFrom:
    - extract:
        key: /keycloak/database/keycloak-db
---
# Realm secrets for KeycloakRealmImport — provides placeholder values for
# OAuth2 client secrets and test user passwords used by the e-commerce realm.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-realm-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-realm-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /e-commerce/keycloak/clients
    - extract:
        key: /e-commerce/keycloak/users