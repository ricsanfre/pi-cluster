apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-externalsecret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-secret
  data:
    - secretKey: password
      remoteRef:
        key: keycloak/admin
        property: password
    - secretKey: username
      remoteRef:
        key: keycloak/admin
        property: username
---
# DB credentials synced from the databases namespace (shared CNPG cluster).
# The CNPG managed role keycloak_owner owns the keycloak database.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-db-externalsecret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-db-secret
  dataFrom:
    - extract:
        key: /keycloak/database/keycloak-db
---
# Realm secrets for KeycloakRealmImport — provides placeholder values for
# OAuth2 client secrets and test user passwords used by the e-commerce realm.
# Each secret is stored in its own Vault path (matching the Terraform module's
# auto-generation format: secret/<file>/<key>).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-realm-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-realm-secrets
    creationPolicy: Owner
  data:
    # Client secrets
    - secretKey: KC_CLIENT_ECOMMERCE_WEB
      remoteRef:
        key: /e-commerce/keycloak/clients/e-commerce-web
        property: CLIENT_SECRET
    - secretKey: KC_CLIENT_CART_SERVICE
      remoteRef:
        key: /e-commerce/keycloak/clients/cart-service
        property: CLIENT_SECRET
    - secretKey: KC_CLIENT_ORDER_SERVICE
      remoteRef:
        key: /e-commerce/keycloak/clients/order-service
        property: CLIENT_SECRET
    - secretKey: KC_CLIENT_REVIEWS_SERVICE
      remoteRef:
        key: /e-commerce/keycloak/clients/reviews-service
        property: CLIENT_SECRET
    - secretKey: KC_CLIENT_PRODUCT_SERVICE
      remoteRef:
        key: /e-commerce/keycloak/clients/product-service
        property: CLIENT_SECRET
    - secretKey: KC_CLIENT_USER_SERVICE
      remoteRef:
        key: /e-commerce/keycloak/clients/user-service
        property: CLIENT_SECRET
    - secretKey: KC_CLIENT_NOTIFICATION_SERVICE
      remoteRef:
        key: /e-commerce/keycloak/clients/notification-service
        property: CLIENT_SECRET
    # User passwords
    - secretKey: KC_USER_TESTUSER_PASSWORD
      remoteRef:
        key: /e-commerce/keycloak/users/testuser
        property: password
    - secretKey: KC_USER_OTHERUSER_PASSWORD
      remoteRef:
        key: /e-commerce/keycloak/users/otheruser
        property: password
    - secretKey: KC_USER_ADMINUSER_PASSWORD
      remoteRef:
        key: /e-commerce/keycloak/users/adminuser
        property: password