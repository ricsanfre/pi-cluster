# Istio PeerAuthentication — keycloak namespace
# Requires all traffic in the keycloak namespace to use mTLS (STRICT mode).
# Works with Istio ambient mode: ztunnel enforces mTLS at L4.
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: keycloak-strict
  namespace: keycloak
spec:
  mtls:
    mode: STRICT