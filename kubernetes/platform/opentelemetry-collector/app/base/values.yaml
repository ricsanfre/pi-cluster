# opentelemetry-collector helm values (base)
image:
  # Repo set to contrib directory to add community receivers and exporters
  repository: "otel/opentelemetry-collector-contrib"
fullnameOverride: otel-collector
# OTEL deployed as Kubernetes Deployment
mode: deployment
# Presets: https://opentelemetry.io/docs/platforms/kubernetes/helm/collector/#presets
presets:
  # Kubernetes Attribute Preset
  # The OpenTelemetry Collector can be configured to add Kubernetes metadata, such as `k8s.pod.name`, `k8s.namespace.name`, and `k8s.node.name`, to logs, metrics and traces.
  # https://opentelemetry.io/docs/platforms/kubernetes/helm/collector/#kubernetes-attributes-preset
  # It adds kubernetes attributes processor to each pipeline: https://opentelemetry.io/docs/platforms/kubernetes/collector/components/#kubernetes-attributes-processor
  kubernetesAttributes:
    enabled: true
resources:
  limits:
    memory: 200Mi
service:
  type: ClusterIP
# Enable OTEL Collector Metrics Port
ports:
  metrics:
    enabled: true
podAnnotations:
  prometheus.io/scrape: "true"
config:
  # All receivers, extensions, and telemetry endpoints are explicitly set to
  # 0.0.0.0 instead of the chart default ${env:MY_POD_IP} to avoid Flux 2.9
  # strict-mode postBuild variable substitution errors.
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    jaeger:
      protocols:
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_http:
          endpoint: 0.0.0.0:14268
        thrift_compact:
          endpoint: 0.0.0.0:6831
    zipkin:
      endpoint: 0.0.0.0:9411
    prometheus:
      config:
        scrape_configs:
          - job_name: opentelemetry-collector
            scrape_interval: 10s
            static_configs:
              - targets: [0.0.0.0:8888]
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  # By Default helm chart enables debug exporter
  exporters:
    debug:
      verbosity: basic

  processors:
    # Add stable service resource attributes derived from Kubernetes metadata.
    # k8sattributes processor (enabled via kubernetesAttributes preset) provides
    # k8s.namespace.name, k8s.pod.name, etc. — these are mapped to OTEL semantic
    # conventions below.
    resource:
      attributes:
      - key: service.instance.id
        from_attribute: k8s.pod.uid
        action: insert
      - key: service.namespace
        from_attribute: k8s.namespace.name
        action: insert

  # Spanmetrics Connector is a component in the OpenTelemetry Collector that allows you to derive metrics from span data. This is particularly useful when you have robust tracing but lack native metrics support in your language or framework.
  # Converting traces to metrics offers valuable insights into system performance and health without requiring separate instrumentation
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/connector/spanmetricsconnector
  # The spanmetrics connector replaces spanmetrics processor with multiple improvements
  connectors:
    spanmetrics: {}
  service:
    # Remove default debug exporter pipelines
    pipelines: {}
    # Export OTEL collector internal telemetry via OLTP
    # https://opentelemetry.io/docs/collector/internal-telemetry/
    telemetry:
      metrics:
        level: detailed
        readers:
          - periodic:
              interval: 10000
              timeout: 5000
              exporter:
                otlp:
                  protocol: http/protobuf
                  endpoint: http://otel-collector:4318