# opentelemetry-collector helm values (elasticsearch-exporter)
extraEnvs:
  - name: ELASTIC_USER
    valueFrom:
      secretKeyRef:
        name: otel-elasticsearch-exporter-secret
        key: es-username
  - name: ELASTIC_PASSWORD
    valueFrom:
      secretKeyRef:
        name: otel-elasticsearch-exporter-secret
        key: es-password

config:
  processors:
    # Custom logs/elasticsearch does not get the preset k8sattributes injection,
    # so derive service.namespace after explicit Kubernetes enrichment.
    resource/elasticsearch:
      attributes:
        - key: service.namespace
          from_attribute: k8s.namespace.name
          action: upsert
  extensions:
    basicauth:
      client_auth:
        # elastic user and password from environment variable
        # escaped with $$ to avoid to be interpreted by FluxCD var substitution
        username: "$${env:ELASTIC_USER}"
        password: "$${env:ELASTIC_PASSWORD}"
  exporters:
    elasticsearch:
      endpoint: "http://efk-es-http.elastic:9200"
      auth:
        authenticator: basicauth
      # logs_index: "otel"
  service:
    extensions:
      - health_check
      - basicauth
    pipelines:
      logs/elasticsearch:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resource/elasticsearch, resource, batch]
        exporters: [elasticsearch]