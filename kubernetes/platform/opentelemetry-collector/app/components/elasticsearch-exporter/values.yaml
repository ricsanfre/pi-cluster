# opentelemetry-collector helm values (elasticsearch-exporter)
extraEnvs:
  - name: ELASTIC_USER
    valueFrom:
      secretKeyRef:
        name: otel-elasticsearch-exporter-secret
        key: es-username
  - name: ELASTIC_PASSWORD
    valueFrom:
      secretKeyRef:
        name: otel-elasticsearch-exporter-secret
        key: es-password

config:
  processors:
    # Elasticsearch dashboards filter on service.namespace, but for Kubernetes
    # workloads the namespace arrives on log attributes and must be promoted.
    transform/elasticsearch:
      log_statements:
        - context: log
          statements:
            - set(resource.attributes["service.namespace"], log.attributes["k8s.namespace.name"])
  extensions:
    basicauth:
      client_auth:
        # elastic user and password from environment variable
        # escaped with $$ to avoid to be interpreted by FluxCD var substitution
        username: "$${env:ELASTIC_USER}"
        password: "$${env:ELASTIC_PASSWORD}"
  exporters:
    elasticsearch:
      endpoint: "http://efk-es-http.elastic:9200"
      auth:
        authenticator: basicauth
      # logs_index: "otel"
  service:
    extensions:
      - health_check
      - basicauth
    pipelines:
      logs/elasticsearch:
        receivers: [otlp]
        processors: [memory_limiter, transform/elasticsearch, resource, batch]
        exporters: [elasticsearch]