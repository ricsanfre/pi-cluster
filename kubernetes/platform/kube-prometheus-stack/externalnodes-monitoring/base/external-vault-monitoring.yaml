---
# Headless service for Vault metrics. No selector
apiVersion: v1
kind: Service
metadata:
  name: vault-ext-service
  labels:
    app.kubernetes.io/name: vault-ext-service
  annotations:
    ignore-check.kube-linter.io/dangling-service: This is a headless service, and so has no selectors.

spec:
  clusterIP: None
  ports:
    - name: vaultport
      port: 8200
      protocol: TCP
      targetPort: 8200
  type: ClusterIP
---
# Endpoint for the headless service without selector
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: vault-ext-service
  labels:
    kubernetes.io/service-name: vault-ext-service
addressType: IPv4
endpoints:
  - addresses:
      - 10.20.0.8
    conditions:
      ready: true
ports:
  - name: vaultport
    port: 8200
    protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vault
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vault
  namespaceSelector:
    matchNames:
      - kube-prom-stack
  endpoints:
    - interval: 30s
      path: /v1/sys/metrics
      params:
        format:
          - prometheus
      port: vaultport
      scheme: https
      scrapeTimeout: 30s
      bearerTokenFile: /vault/secrets/token
