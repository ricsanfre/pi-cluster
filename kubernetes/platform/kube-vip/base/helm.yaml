---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-vip
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-vip
      version: 0.9.8
      sourceRef:
        kind: HelmRepository
        name: kube-vip
        namespace: flux-system
  releaseName: kube-vip
  targetNamespace: kube-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  valuesFrom:
  - kind: ConfigMap
    name: kube-vip-helm-values
    valuesKey: base-values.yaml
