---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dashboard-kube-vip
spec:
  allowCrossNamespaceImport: true
  folder: Kube-Vip
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |-
    {
        "__inputs": [],
        "__requires": [],
        "annotations": {
            "list": []
        },
        "editable": false,
        "graphTooltip": 0,
        "links": [],
        "panels": [
            {
                "id": 1,
                "title": "Pods Scrapeable",
                "type": "stat",
                "gridPos": {
                    "h": 3,
                    "w": 6,
                    "x": 0,
                    "y": 0
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "description": "Number of kube-vip pods successfully scraped by Prometheus. Should equal the number of control plane nodes (3).",
                "targets": [
                    {
                        "expr": "count(up{job=\"kube-system/kube-vip\"} == 1)",
                        "instant": true,
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "red",
                                    "value": null
                                },
                                {
                                    "color": "yellow",
                                    "value": 1
                                },
                                {
                                    "color": "green",
                                    "value": 3
                                }
                            ]
                        }
                    }
                },
                "options": {
                    "textMode": "value",
                    "colorMode": "background",
                    "graphMode": "none",
                    "justifyMode": "center"
                }
            },
            {
                "id": 2,
                "title": "Pods Down",
                "type": "stat",
                "gridPos": {
                    "h": 3,
                    "w": 6,
                    "x": 6,
                    "y": 0
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "description": "Number of kube-vip pods whose metrics endpoint is unreachable. Should be 0.",
                "targets": [
                    {
                        "expr": "count(up{job=\"kube-system/kube-vip\"} == 0) OR vector(0)",
                        "instant": true,
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "green",
                                    "value": null
                                },
                                {
                                    "color": "red",
                                    "value": 1
                                }
                            ]
                        }
                    }
                },
                "options": {
                    "textMode": "value",
                    "colorMode": "background",
                    "graphMode": "none",
                    "justifyMode": "center"
                }
            },
            {
                "id": 3,
                "title": "DaemonSet Ready",
                "type": "stat",
                "gridPos": {
                    "h": 3,
                    "w": 6,
                    "x": 12,
                    "y": 0
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "description": "Number of DaemonSet pods currently ready. Should match Desired (3).",
                "targets": [
                    {
                        "expr": "kube_daemonset_status_number_ready{namespace=\"kube-system\", daemonset=\"kube-vip\"}",
                        "instant": true,
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "red",
                                    "value": null
                                },
                                {
                                    "color": "yellow",
                                    "value": 1
                                },
                                {
                                    "color": "green",
                                    "value": 3
                                }
                            ]
                        }
                    }
                },
                "options": {
                    "textMode": "value",
                    "colorMode": "background",
                    "graphMode": "none",
                    "justifyMode": "center"
                }
            },
            {
                "id": 4,
                "title": "DaemonSet Desired",
                "type": "stat",
                "gridPos": {
                    "h": 3,
                    "w": 6,
                    "x": 18,
                    "y": 0
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "description": "Number of nodes that should run a kube-vip pod. Should be 3 (one per control plane node).",
                "targets": [
                    {
                        "expr": "kube_daemonset_status_desired_number_scheduled{namespace=\"kube-system\", daemonset=\"kube-vip\"}",
                        "instant": true,
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "red",
                                    "value": null
                                },
                                {
                                    "color": "green",
                                    "value": 3
                                }
                            ]
                        }
                    }
                },
                "options": {
                    "textMode": "value",
                    "colorMode": "background",
                    "graphMode": "none",
                    "justifyMode": "center"
                }
            },
            {
                "id": 5,
                "title": "Pod Status Detail",
                "type": "table",
                "gridPos": {
                    "h": 7,
                    "w": 24,
                    "x": 0,
                    "y": 3
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "description": "Per-pod metrics scrape status. Value 1 = healthy, 0 = scrape failing.",
                "targets": [
                    {
                        "expr": "up{job=\"kube-system/kube-vip\"}",
                        "instant": true,
                        "format": "table",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "custom": {
                            "align": "auto",
                            "filterable": false
                        },
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "red",
                                    "value": null
                                },
                                {
                                    "color": "green",
                                    "value": 1
                                }
                            ]
                        },
                        "mappings": [
                            {
                                "type": "value",
                                "value": "1",
                                "result": {
                                    "text": "UP"
                                }
                            },
                            {
                                "type": "value",
                                "value": "0",
                                "result": {
                                    "text": "DOWN"
                                }
                            }
                        ]
                    },
                    "overrides": [
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Value"
                            },
                            "properties": [
                                {
                                    "id": "displayName",
                                    "value": "Status"
                                },
                                {
                                    "id": "custom.cellOptions",
                                    "value": {
                                        "type": "color-background"
                                    }
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "instance"
                            },
                            "properties": [
                                {
                                    "id": "displayName",
                                    "value": "Scrape Target"
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "pod"
                            },
                            "properties": [
                                {
                                    "id": "displayName",
                                    "value": "Pod"
                                }
                            ]
                        }
                    ]
                },
                "options": {
                    "showTypeIcons": false,
                    "sortBy": [
                        {
                            "desc": false,
                            "displayName": "Pod"
                        }
                    ]
                }
            },
            {
                "id": 6,
                "title": "Build Info per Node",
                "type": "table",
                "gridPos": {
                    "h": 7,
                    "w": 24,
                    "x": 0,
                    "y": 10
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "description": "Kube-vip version and build hash per node. Useful for verifying all control plane nodes run the same version.",
                "targets": [
                    {
                        "expr": "kube_vip_build_info",
                        "instant": true,
                        "format": "table",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "custom": {
                            "align": "auto",
                            "filterable": false
                        }
                    },
                    "overrides": [
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Value"
                            },
                            "properties": [
                                {
                                    "id": "custom.hidden",
                                    "value": true
                                }
                            ]
                        }
                    ]
                },
                "options": {
                    "showTypeIcons": false,
                    "sortBy": [
                        {
                            "desc": false,
                            "displayName": "node"
                        }
                    ]
                }
            }
        ],
        "refresh": "10s",
        "style": "dark",
        "tags": [
            "kubernetes",
            "kube-vip",
            "control-plane",
            "ha"
        ],
        "templating": {
            "list": [
                {
                    "current": {
                        "text": "default",
                        "value": "default"
                    },
                    "hide": 0,
                    "label": "Data Source",
                    "name": "datasource",
                    "options": [],
                    "query": "prometheus",
                    "refresh": 1,
                    "regex": "",
                    "type": "datasource"
                }
            ]
        },
        "time": {
            "from": "now-1h",
            "to": "now"
        },
        "timepicker": {
            "refresh_intervals": [
                "10s",
                "30s",
                "1m",
                "5m",
                "15m",
                "30m",
                "1h"
            ]
        },
        "timezone": "browser",
        "title": "Kube-Vip / Control Plane HA"
    }
