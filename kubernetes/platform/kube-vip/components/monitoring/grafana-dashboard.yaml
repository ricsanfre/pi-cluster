---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: grafana-dashboard-kube-vip
spec:
  allowCrossNamespaceImport: true
  folder: Kube-Vip
  instanceSelector:
    matchLabels:
      dashboards: grafana
  json: |-
    {
        "__inputs": [],
        "__requires": [],
        "annotations": {
            "list": []
        },
        "editable": false,
        "graphTooltip": 0,
        "links": [],
        "panels": [
            {
                "id": 1,
                "title": "VIP Leader Count",
                "type": "stat",
                "gridPos": {
                    "h": 3,
                    "w": 8,
                    "x": 0,
                    "y": 0
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "description": "Number of control plane nodes currently holding the VIP. Should be exactly 1.",
                "targets": [
                    {
                        "expr": "sum(kube_vip_is_leader)",
                        "instant": true,
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "red",
                                    "value": null
                                },
                                {
                                    "color": "green",
                                    "value": 1
                                },
                                {
                                    "color": "red",
                                    "value": 2
                                }
                            ]
                        }
                    }
                },
                "options": {
                    "textMode": "value",
                    "colorMode": "background",
                    "graphMode": "none",
                    "justifyMode": "center"
                }
            },
            {
                "id": 2,
                "title": "Current Leader",
                "type": "stat",
                "gridPos": {
                    "h": 3,
                    "w": 16,
                    "x": 8,
                    "y": 0
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "description": "The control plane node currently holding the Virtual IP.",
                "targets": [
                    {
                        "expr": "kube_vip_is_leader == 1",
                        "legendFormat": "{{instance}}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "red",
                                    "value": null
                                },
                                {
                                    "color": "green",
                                    "value": 1
                                }
                            ]
                        }
                    }
                },
                "options": {
                    "textMode": "name",
                    "colorMode": "background",
                    "graphMode": "none",
                    "justifyMode": "center"
                }
            },
            {
                "id": 3,
                "title": "Leadership History per Node",
                "type": "state-timeline",
                "gridPos": {
                    "h": 7,
                    "w": 24,
                    "x": 0,
                    "y": 3
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "description": "Per-node leader status over time. Green indicates the node holds the VIP; blue indicates standby.",
                "targets": [
                    {
                        "expr": "kube_vip_is_leader",
                        "legendFormat": "{{instance}}",
                        "refId": "A"
                    }
                ],
                "options": {
                    "mergeValues": true,
                    "showValue": "never",
                    "alignValue": "center"
                },
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                {
                                    "color": "blue",
                                    "value": 0
                                },
                                {
                                    "color": "green",
                                    "value": 1
                                }
                            ]
                        }
                    }
                }
            },
            {
                "id": 4,
                "title": "Leader Transitions",
                "type": "timeseries",
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 0,
                    "y": 10
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "description": "Leadership changes per instance over the preceding 5-minute rolling window. Plateaus indicate recent failover events; sustained elevated values indicate flapping.",
                "targets": [
                    {
                        "expr": "increase(kube_vip_leader_changes_total[5m])",
                        "legendFormat": "{{instance}}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "unit": "short",
                        "custom": {
                            "drawStyle": "line",
                            "lineInterpolation": "stepAfter",
                            "fillOpacity": 20,
                            "showPoints": "auto",
                            "pointSize": 5
                        }
                    }
                },
                "options": {
                    "legend": {
                        "calcs": [
                            "max",
                            "sum"
                        ],
                        "displayMode": "table",
                        "placement": "right",
                        "showLegend": true
                    },
                    "tooltip": {
                        "mode": "multi"
                    }
                }
            },
            {
                "id": 5,
                "title": "Gratuitous ARP Packet Rate",
                "type": "timeseries",
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 12,
                    "y": 10
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                },
                "description": "Rate of gratuitous ARP packets sent by each kube-vip instance to advertise the VIP to the local network. A steady low rate (~0.3 pps per standby node) is normal; spikes indicate leadership transitions or ARP storms.",
                "targets": [
                    {
                        "expr": "rate(kube_vip_arp_packets_total[$__rate_interval])",
                        "legendFormat": "{{instance}}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "unit": "pps",
                        "custom": {
                            "drawStyle": "line",
                            "lineInterpolation": "stepAfter",
                            "showPoints": "never"
                        }
                    }
                },
                "options": {
                    "legend": {
                        "displayMode": "table",
                        "placement": "right",
                        "showLegend": true
                    },
                    "tooltip": {
                        "mode": "multi"
                    }
                }
            }
        ],
        "refresh": "10s",
        "style": "dark",
        "tags": [
            "kubernetes",
            "kube-vip",
            "control-plane",
            "ha"
        ],
        "templating": {
            "list": [
                {
                    "current": {
                        "text": "default",
                        "value": "default"
                    },
                    "hide": 0,
                    "label": "Data Source",
                    "name": "datasource",
                    "options": [],
                    "query": "prometheus",
                    "refresh": 1,
                    "regex": "",
                    "type": "datasource"
                }
            ]
        },
        "time": {
            "from": "now-1h",
            "to": "now"
        },
        "timepicker": {
            "refresh_intervals": [
                "10s",
                "30s",
                "1m",
                "5m",
                "15m",
                "30m",
                "1h"
            ]
        },
        "timezone": "browser",
        "title": "Kube-Vip / Control Plane HA"
    }
