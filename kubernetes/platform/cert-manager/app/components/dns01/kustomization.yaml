apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

configMapGenerator:
  - name: cert-manager-helm-values
    behavior: merge
    files:
      - dns01-values.yaml=values.yaml

patches:
- target:
    group: helm.toolkit.fluxcd.io
    kind: HelmRelease
    name: cert-manager
  path: helm-patch.yaml
