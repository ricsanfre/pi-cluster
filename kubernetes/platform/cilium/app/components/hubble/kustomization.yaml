apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - httproute.yaml
  - oauth2-external-secret.yaml
  - security-policy.yaml

configMapGenerator:
  - name: cilium-helm-values
    behavior: merge
    files:
      - hubble-values.yaml=values.yaml

patches:
- target:
    group: helm.toolkit.fluxcd.io
    kind: HelmRelease
    name: cilium
  path: helm-patch.yaml
