apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: schema-registry-oauth2-externalsecret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: schema-registry-oauth2-externalsecret
  data:
  - secretKey: client-id
    remoteRef:
      key: schema-registry/oauth2
      property: client-id
  - secretKey: client-secret
    remoteRef:
      key: schema-registry/oauth2
      property: client-secret