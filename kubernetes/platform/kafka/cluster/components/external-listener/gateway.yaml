apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kafka-gateway
spec:
  gatewayClassName: envoy
  infrastructure:
    annotations:
      io.cilium/lb-ipam-ips: ${KAFKA_GATEWAY_LOAD_BALANCER_IP}
  listeners:
  - name: kafka-listener
    protocol: TLS
    port: 9094
    tls:
      mode: Passthrough