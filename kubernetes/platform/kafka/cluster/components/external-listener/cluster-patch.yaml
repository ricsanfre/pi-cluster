- op: add
  path: /spec/kafka/listeners/-
  value:
    name: external # TLS listener for external access
    port: 9094
    type: cluster-ip # Use cluster-ip to let the Gateway handle the routing
    tls: true
    authentication:
      type: scram-sha-512 # Set authentication to scram-sha-512
    configuration: # Configure Service resources created by Strimzi
      createBootstrapService: true # Create a Service for the bootstrap listener
      # bootstrap:
        # annotations:
        #   external-dns.alpha.kubernetes.io/hostname: kafka-bootstrap.${CLUSTER_DOMAIN}.
        #   external-dns.alpha.kubernetes.io/ttl: "60"
      brokers:
        - broker: 0
          # annotations:
          #   external-dns.alpha.kubernetes.io/hostname: kafka-broker-0.${CLUSTER_DOMAIN}.
          #   external-dns.alpha.kubernetes.io/ttl: "60"
          advertisedHost: kafka-broker-0.${CLUSTER_DOMAIN}
          advertisedPort: 9094
        - broker: 1
          # annotations:
          #   external-dns.alpha.kubernetes.io/hostname: kafka-broker-1.${CLUSTER_DOMAIN}.
          #   external-dns.alpha.kubernetes.io/ttl: "60"
          advertisedHost: kafka-broker-1.${CLUSTER_DOMAIN}
          advertisedPort: 9094
        - broker: 2
          # annotations:
          #   external-dns.alpha.kubernetes.io/hostname: kafka-broker-2.${CLUSTER_DOMAIN}.
          #   external-dns.alpha.kubernetes.io/ttl: "60"
          advertisedHost: kafka-broker-2.${CLUSTER_DOMAIN}
          advertisedPort: 9094
      # Use External Certificate
      brokerCertChainAndKey:
        secretName: kafka-tls
        certificate: tls.crt
        key: tls.key
