apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kafdrop-oauth2-externalsecret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kafdrop-oauth2-externalsecret
  data:
  - secretKey: client-id
    remoteRef:
      key: kafdrop/oauth2
      property: client-id
  - secretKey: client-secret
    remoteRef:
      key: kafdrop/oauth2
      property: client-secret