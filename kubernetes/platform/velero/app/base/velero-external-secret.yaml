apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-externalsecret
  namespace: velero
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: velero-secret
    template:
      engineVersion: v2
      data: 
        cloud: |
          [default]
          aws_access_key_id: "{{ .user | toString }}"
          aws_secret_access_key: "{{ .key | toString }}"
  data:
  - secretKey: user
    remoteRef:
      key: s3/velero
      property: username
  - secretKey: key
    remoteRef:
      key: s3/velero
      property: key
