apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

configMapGenerator:
  - name: envoy-gateway-helm-values
    behavior: merge
    files:
      - otel-values.yaml=values.yaml

patches:
- target:
    group: helm.toolkit.fluxcd.io
    kind: HelmRelease
    name: envoy-gateway
  path: helm-patch.yaml