# Istio PeerAuthentication — envoy-gateway-system namespace
# PERMISSIVE mode: accepts both mTLS and plaintext traffic.
# STRICT would block external traffic to the ingress gateway since
# external clients don't have SPIFFE identities. mTLS between mesh
# workloads is still enforced at the workload level.
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: envoy-gateway-permissive
  namespace: envoy-gateway-system
spec:
  mtls:
    mode: PERMISSIVE
