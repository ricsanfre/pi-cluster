apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pi-cluster-tls
spec:
  dnsNames:
    - ${CLUSTER_DOMAIN}
    - "*.${CLUSTER_DOMAIN}"
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-issuer
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  secretName: pi-cluster-tls
  usages:
    - digital signature