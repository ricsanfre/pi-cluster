---
extends: default

ignore:
  - kubernetes/fluxcd-app-template
  - ansible/vars/vault.yaml # An encrypted file

rules:
  line-length:
    max: 120
    level: warning
    ignore:
      # The below have versioning/fluent strings
      - .pre-commit-config.yaml
      - ansible/host_vars/service0.yaml
      - ansible-runner/build/ansible_runner_setup.yaml
      - ansible/roles/velero_cli/tasks/configure_velero_cli.yaml
  braces:
    forbid: false
    min-spaces-inside: 0
    max-spaces-inside: 1
    min-spaces-inside-empty: 0
    max-spaces-inside-empty: 0
  comments:
    min-spaces-from-content: 1
  comments-indentation: false
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true
