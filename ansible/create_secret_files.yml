---
# Generate IONOS credentials file for certbot DNS challenge
#
# Usage:
#   ansible-playbook ansible/create_secret_files.yml
#
# Optional overrides:
#   ansible-playbook ansible/create_secret_files.yml \
#     -e ionos_credentials_file='~/.secrets/ionos-credentials.ini' \
#     -e ionos_api_endpoint='https://api.hosting.ionos.com' \
#     -e github_pat_file='~/.secrets/github-pat.ini'

- name: Create IONOS credentials file
  hosts: localhost
  gather_facts: false
  vars:
    ionos_credentials_file: "~/.secrets/ionos-credentials.ini"
    ionos_api_endpoint: "https://api.hosting.ionos.com"
    github_pat_file: "~/.secrets/github-pat.ini"

  vars_prompt:
    - name: ionos_public_prefix
      prompt: Enter IONOS public prefix
      private: true
    - name: ionos_secret
      prompt: Enter IONOS secret
      private: true

  pre_tasks:
    - name: Validate required IONOS input variables
      ansible.builtin.assert:
        that:
          - ionos_public_prefix | trim | length > 0
          - ionos_secret | trim | length > 0
        fail_msg: |
          Invalid input: both IONOS variables are required.

          Please provide non-empty values for:
            - ionos_public_prefix
            - ionos_secret

    - name: Ask for GIT PAT credentials
      when: git_private_repo | default(false)
      block:
        - name: Ask for GitHub PAT credentials
          ansible.builtin.pause:
            prompt: "Enter Github PAT: "
            echo: false
          register: prompt

        - name: Set GitHub PAT variable
          ansible.builtin.set_fact:
            github_pat: "{{ prompt.user_input }}"
          no_log: true

    - name: Validate GitHub PAT input variable
      ansible.builtin.assert:
        that:
          - github_pat | trim | length > 0
        fail_msg: |
          Invalid input: GitHub PAT is required when git_private_repo=true.
      when: git_private_repo | default(false)

    - name: Ensure destination directory exists with secure permissions
      ansible.builtin.file:
        path: "{{ ionos_credentials_file | dirname }}"
        state: directory
        mode: "0700"

    - name: Ensure GitHub PAT destination directory exists with secure permissions
      ansible.builtin.file:
        path: "{{ github_pat_file | dirname }}"
        state: directory
        mode: "0700"
      when: git_private_repo | default(false)

  tasks:
    - name: Generate IONOS credentials file
      ansible.builtin.template:
        src: ionos-credentials.ini.j2
        dest: "{{ ionos_credentials_file }}"
        mode: "0600"

    - name: Validate generated credentials file format
      ansible.builtin.slurp:
        src: "{{ ionos_credentials_file }}"
      register: ionos_credentials_raw

    - name: Check generated credentials format contains required keys
      ansible.builtin.assert:
        that:
          - "(ionos_credentials_content | regex_search('(?m)^\\s*dns_ionos_prefix\\s*=\\s*\\S+\\s*$')) is not none"
          - "(ionos_credentials_content | regex_search('(?m)^\\s*dns_ionos_secret\\s*=\\s*\\S+\\s*$')) is not none"
        fail_msg: |
          Generated file format is invalid.

          File: {{ ionos_credentials_file }}
          Expected keys:
            - dns_ionos_prefix
            - dns_ionos_secret
      vars:
        ionos_credentials_content: "{{ ionos_credentials_raw.content | b64decode }}"

    - name: Generate GitHub PAT credentials file
      ansible.builtin.copy:
        dest: "{{ github_pat_file }}"
        mode: "0600"
        content: |
          github_pat = {{ github_pat }}
      when: git_private_repo | default(false)
      no_log: true

    - name: Validate generated GitHub PAT file format
      ansible.builtin.slurp:
        src: "{{ github_pat_file }}"
      register: github_pat_raw
      when: git_private_repo | default(false)

    - name: Check generated GitHub PAT file format contains required key
      ansible.builtin.assert:
        that:
          - "(github_pat_content | regex_search('(?m)^\\s*github_pat\\s*=\\s*\\S+\\s*$')) is not none"
        fail_msg: |
          Generated GitHub PAT file format is invalid.

          File: {{ github_pat_file }}
          Expected key:
            - github_pat
      vars:
        github_pat_content: "{{ github_pat_raw.content | b64decode }}"
      when: git_private_repo | default(false)

    - name: Display success message
      ansible.builtin.debug:
        msg: |
          IONOS credentials file created successfully.

          File: {{ ionos_credentials_file }}
          Permissions: 0600

          You can now use this file with certbot DNS IONOS authenticator.
          {% if git_private_repo | default(false) %}

          GitHub PAT credentials file created successfully.

          File: {{ github_pat_file }}
          Permissions: 0600
          {% endif %}
