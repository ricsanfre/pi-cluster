---
- name: Download Velero CLI
  ansible.builtin.get_url:
    url: https://github.com/vmware-tanzu/velero/releases/download/{{ velero_cli_velero_version }}/velero-{{
      velero_cli_velero_version }}-linux-{{ velero_cli_velero_arch }}.tar.gz
    dest: /tmp/velero-{{ velero_cli_velero_version }}-linux-{{ velero_cli_velero_arch }}.tar.gz
    mode: "0766"

- name: Extract archives
  ansible.builtin.unarchive:
    src: /tmp/velero-{{ velero_cli_velero_version }}-linux-{{ velero_cli_velero_arch }}.tar.gz
    dest: /tmp
    remote_src: true

- name: Copy binary to /usr/local/bin
  ansible.builtin.copy:
    src: /tmp/velero-{{ velero_cli_velero_version }}-linux-{{ velero_cli_velero_arch }}/velero
    dest: /usr/local/bin/velero
    mode: "0755"
    remote_src: true
