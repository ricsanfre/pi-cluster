---
- name: Read IONOS credentials file from localhost
  ansible.builtin.set_fact:
    ionos_credentials_content: "{{ lookup('file', ionos_credentials_file) }}"

- name: Set IONOS credentials facts from file
  ansible.builtin.set_fact:
    ionos_public_prefix: "{{ (ionos_credentials_content | regex_search('(?m)^\\s*dns_ionos_prefix\\s*=\\s*(\\S+)\\s*$', '\\1') | first) | default('') }}"
    ionos_secret: "{{ (ionos_credentials_content | regex_search('(?m)^\\s*dns_ionos_secret\\s*=\\s*(\\S+)\\s*$', '\\1') | first) | default('') }}"

- name: Validate IONOS credentials file format
  ansible.builtin.assert:
    that:
      - ionos_public_prefix | length > 0
      - ionos_secret | length > 0
    fail_msg: |
      Invalid IONOS credentials file format.

      File: {{ ionos_credentials_file }}
      Required format:
        dns_ionos_prefix = your-ionos-public-prefix
        dns_ionos_secret = your-ionos-secret-key

- name: Create/update certmanager/ionos credentials in Vault
  community.hashi_vault.vault_write:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    validate_certs: "{{ not (enable_letsencrypt | default(false)) }}"
    ca_cert: "{{ vault_cacert | default(omit) }}"
    path: "secret/data/certmanager/ionos"
    data:
      data:
        public-prefix: "{{ ionos_public_prefix }}"
        secret: "{{ ionos_secret }}"
  no_log: true
