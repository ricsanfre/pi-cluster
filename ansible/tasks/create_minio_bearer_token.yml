---
# Minio prometheus bearer token was created and stored in filesystem
- name: Load prometheus bearer token from file in vault node
  ansible.builtin.command: "jq -r '.bearerToken' /etc/minio/prometheus_bearer.json"
  register: root_token
  become: true
  changed_when: false
  when: minio_prom_bearer_token is not defined
  delegate_to: node1

- name: Get bearer token
  ansible.builtin.set_fact:
    minio_prom_bearer_token: "{{ root_token.stdout }}"

- name: Create/update minio/prometheus credentials in Vault
  community.hashi_vault.vault_write:
    path: "minio/prometheus"
    data:
      bearer_token: "{{ minio_prom_bearer_token }}"
  environment:
    VAULT_ADDR: "{{ lookup('env', 'VAULT_ADDR') }}"
    VAULT_TOKEN: "{{ lookup('env', 'VAULT_TOKEN') }}"
    VAULT_CACERT: "{{ lookup('env', 'VAULT_CACERT') if (not enable_letsencrypt | default(false)) else '' }}"
  no_log: true
