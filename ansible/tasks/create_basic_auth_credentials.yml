---

- name: Validate Vault environment
  ansible.builtin.assert:
    that:
      - lookup('env', 'VAULT_ADDR') | length > 0
      - lookup('env', 'VAULT_TOKEN') | length > 0
    fail_msg: |
      Vault environment variables not set.
      Please set VAULT_ADDR and VAULT_TOKEN:
        export VAULT_ADDR='https://your-vault-server:8200'
        export VAULT_TOKEN='your-vault-token'
    success_msg: "Vault environment validated"
  tags: ["always"]

- name: Fetch ingress basic auth credentials on-demand from Vault
  community.hashi_vault.vault_kv2_get:
    mount_point: secret
    path: ingress/admin
  register: ingress_vault_secret
  tags: ["always"]

- name: Set ingress credentials facts from Vault
  ansible.builtin.set_fact:
    ingress_basic_auth_user: "{{ ingress_vault_secret.secret.content.username }}"
    ingress_basic_auth_passwd: "{{ ingress_vault_secret.secret.content.password }}"
  tags: ["always"]
  no_log: true

- name: Validate ingress basic auth credentials
  ansible.builtin.assert:
    that:
      - ingress_basic_auth_user is defined
      - ingress_basic_auth_user | length > 0
      - ingress_basic_auth_passwd is defined
      - ingress_basic_auth_passwd | length > 0
    fail_msg: |
      Failed to retrieve ingress credentials from Vault at path secret/ingress/admin
      Please ensure the secret exists with 'content.username' and 'content.password' fields.
      You can create it with:
        vault kv put secret/ingress/admin content='{"username":"admin","password":"your-password"}'
    success_msg: "Ingress credentials retrieved and validated"
  tags: ["always"]

- name: Ensure htpasswd utility is installed
  ansible.builtin.package:
    name: 'apache2-utils'
    state: 'present'
    update_cache: true
  become: true

- name: Htpasswd utility
  ansible.builtin.command:
    cmd: >-
      htpasswd -nb {{ ingress_basic_auth_user }} {{ ingress_basic_auth_passwd }}
  register: htpasswd
  changed_when: false

- name: Set htpasswd pair
  ansible.builtin.set_fact:
    ingress_auth_htpasswd_pair: "{{ htpasswd.stdout }}"

- name: Create/update ingress/basic_auth credentials in Vault
  community.hashi_vault.vault_write:
    path: "ingress/basic_auth"
    data:
      htpasswd_pair: "{{ ingress_auth_htpasswd_pair }}"
  environment:
    VAULT_ADDR: "{{ lookup('env', 'VAULT_ADDR') }}"
    VAULT_TOKEN: "{{ lookup('env', 'VAULT_TOKEN') }}"
    VAULT_CACERT: "{{ lookup('env', 'VAULT_CACERT') if (not enable_letsencrypt | default(false)) else '' }}"
  no_log: true
