- name: Re-run Terraform Vault with all features enabled
  when: rerun_terraform_vault_all_features | default(false)
  block:
    - name: Initialize Terraform Vault directory
      ansible.builtin.command:
        cmd: tofu init -no-color
        chdir: "../terraform/vault"
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_ADDRESS: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_CACERT: "{{ vault_cacert if (not enable_letsencrypt | default(false)) else '' }}"
        TF_VAR_vault_address: "{{ vault_addr }}"
        TF_VAR_vault_token: "{{ vault_token }}"
      changed_when: true

    - name: Display effective Terraform feature flags
      ansible.builtin.debug:
        msg: |
          Terraform feature flags (enforced for plan/apply):
             TF_VAR_enable_kubernetes_auth=true
             TF_VAR_enable_policies=true
             TF_VAR_enable_roles=true
             TF_VAR_enable_secrets=true
             TF_VAR_kubernetes_host=https://{{ k3s_api_vip }}:6443

    - name: Plan Terraform Vault changes with all features
      ansible.builtin.command:
        cmd: >-
          tofu plan
          -no-color
          -var="enable_kubernetes_auth=true"
          -var="enable_policies=true"
          -var="enable_roles=true"
          -var="enable_secrets=true"
          -out=tfplan
        chdir: "../terraform/vault"
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_ADDRESS: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_CACERT: "{{ vault_cacert if (not enable_letsencrypt | default(false)) else '' }}"
        TF_VAR_vault_address: "{{ vault_addr }}"
        TF_VAR_vault_token: "{{ vault_token }}"
        TF_VAR_kubernetes_host: "https://{{ k3s_api_vip }}:6443"
        TF_VAR_enable_kubernetes_auth: "true"
        TF_VAR_enable_policies: "true"
        TF_VAR_enable_roles: "true"
        TF_VAR_enable_secrets: "true"
      changed_when: false

    - name: Apply Terraform Vault configuration
      ansible.builtin.command:
        cmd: tofu apply -no-color -auto-approve tfplan
        chdir: "../terraform/vault"
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_ADDRESS: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_CACERT: "{{ vault_cacert if (not enable_letsencrypt | default(false)) else '' }}"
        TF_VAR_vault_address: "{{ vault_addr }}"
        TF_VAR_vault_token: "{{ vault_token }}"
        TF_VAR_kubernetes_host: "https://{{ k3s_api_vip }}:6443"
        TF_VAR_enable_kubernetes_auth: "true"
        TF_VAR_enable_policies: "true"
        TF_VAR_enable_roles: "true"
        TF_VAR_enable_secrets: "true"
      changed_when: true
