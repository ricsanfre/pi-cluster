---
- name: Wait for K3S worker nodes to be ready. Nodes Ready status when Cilium has been installed # noqa: no-changed-when
  ansible.builtin.command:
    cmd: "kubectl get nodes {{ item }}"
  register: nodes
  until:
    - '" Ready "  in nodes.stdout'
  retries: 10
  delay: 60
  with_items: "{{ groups['k3s_agent'] }}"

- name: Wait for Cilium CRDs to be ready # noqa: no-changed-when
  become: false
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      while ! kubectl wait --for condition=established --timeout=60s \
      crd/ciliuml2announcementpolicies.cilium.io crd/ciliuml2announcementpolicies.cilium.io
      do
      sleep 10
      done
    executable: /bin/bash

- name: Cilium configuration # noqa: no-changed-when
  become: false
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      kubectl kustomize --enable-helm --load-restrictor=LoadRestrictionsNone \
       ../kubernetes/platform/cilium/config/overlays/"{{ overlay }}" | kubectl apply -f -
    executable: /bin/bash
  register: output
