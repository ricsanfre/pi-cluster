---

- name: Gather architecture facts
  become: true
  ansible.builtin.setup:
    gather_subset:
      - min
  when: ansible_facts.architecture is not defined


- name: Set Longhorn CLI architecture
  ansible.builtin.set_fact:
    longhorn_cli_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64', 'arm64': 'arm64'}.get(ansible_facts.architecture, ansible_facts.architecture) }}"

- name: Download Longhorn CLI
  become: true
  ansible.builtin.get_url:
    url: "https://github.com/longhorn/cli/releases/download/{{ longhorn_version }}/longhornctl-linux-{{ longhorn_cli_arch }}"
    dest: /usr/local/bin/longhornctl
    mode: '0755'
