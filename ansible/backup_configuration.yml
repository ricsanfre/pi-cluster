---

- name: Configure Pi-cluster nodes backup
  hosts: picluster
  gather_facts: true
  tags: [backup]
  become: true
  vars:
    vault_secret_file: "{{ lookup('ansible.builtin.env', 'HOME') }}/.secrets/vault.env"
  pre_tasks:
    # Include picluster variables
    - name: Include picluster variables
      include_vars: "vars/picluster.yml"

    - name: Check Vault secret file exists on controller
      ansible.builtin.stat:
        path: "{{ vault_secret_file }}"
      register: vault_secret_file_stat
      delegate_to: localhost
      become: false

    - name: Validate Vault secret file exists
      ansible.builtin.assert:
        that:
          - vault_secret_file_stat.stat.exists
          - vault_secret_file_stat.stat.isreg
        fail_msg: |
          Vault secret file not found: {{ vault_secret_file }}

          Run external services stage 1 first to generate it, or create it with:

            VAULT_ADDR=https://vault.example.com:8200
            VAULT_TOKEN=s.xxxxxxxxxxxxx
            VAULT_CACERT=/path/to/certificates/CA.pem

    - name: Get Vault environment from secret file
      ansible.builtin.set_fact:
        vault_addr: "{{ lookup('ansible.builtin.ini', 'VAULT_ADDR type=properties file=' ~ vault_secret_file) }}"
        vault_token: "{{ lookup('ansible.builtin.ini', 'VAULT_TOKEN type=properties file=' ~ vault_secret_file) }}"
        vault_cacert: "{{ lookup('ansible.builtin.ini', 'VAULT_CACERT type=properties file=' ~ vault_secret_file, errors='ignore') | default('', true) }}"

    - name: Validate Vault variables loaded from secret file
      ansible.builtin.assert:
        that:
          - vault_addr is defined and vault_addr != ""
          - vault_token is defined and vault_token != ""
        fail_msg: |
          Missing VAULT_ADDR or VAULT_TOKEN in {{ vault_secret_file }}
        success_msg: "Vault environment loaded and validated"
      tags: ["always"]

    - name: Fetch restic S3 credentials on-demand from Vault
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_addr }}"
        token: "{{ vault_token }}"
        validate_certs: "{{ not (enable_letsencrypt | default(false)) }}"
        ca_cert: "{{ vault_cacert | default(omit) }}"
        mount_point: secret
        path: minio/restic
      register: restic_vault_secret
      delegate_to: localhost
      tags: ["always"]
    - name: Set restic environment variables from Vault
      ansible.builtin.set_fact:
        restic_environment:
          - name: AWS_ACCESS_KEY_ID
            value: "{{ (restic_vault_secret.secret | default({})).username | default('', true) }}"
          - name: AWS_SECRET_ACCESS_KEY
            value: "{{ (restic_vault_secret.secret | default({})).key | default('', true) }}"
      tags: ["always"]
      no_log: true
    - name: Validate restic S3 credentials
      ansible.builtin.assert:
        that:
          - restic_environment is defined
          - restic_environment | length > 0
          - restic_environment[0].value is defined
          - restic_environment[0].value | length > 0
          - restic_environment[1].value is defined
          - restic_environment[1].value | length > 0
        fail_msg: |
          Failed to retrieve restic credentials from Vault at path secret/minio/restic
          Please ensure the secret exists and contains 'username' and 'key' fields.
        success_msg: "Restic S3 credentials retrieved and validated"
      tags: ["always"]
    - name: Load CA certificate for restic
      set_fact:
        restic_ca_cert: "{{ lookup('file','certificates/CA.pem') }}"
      when: not enable_letsencrypt
    - name: Do not use CA certificate
      set_fact:
        restic_use_ca_cert: false
      when: enable_letsencrypt
  roles:
    - role: ricsanfre.backup
      tags: [backup]
