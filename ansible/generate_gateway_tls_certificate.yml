---
## Generate TLS certificates gateway
## Generated using certbot (letsencrypt)
- name: Generate gateway certificate
  hosts: localhost
  gather_facts: true
  tags: [certificates]
  vars:
    propagation_seconds: 300
    ionos_credentials_file: "~/.secrets/ionos-credentials.ini"
    certbot_config_dir: "{{ lookup('ansible.builtin.env', 'HOME') }}/.certbot/config"
    certbot_work_dir: "{{ lookup('ansible.builtin.env', 'HOME') }}/.certbot/work"
    certbot_logs_dir: "{{ lookup('ansible.builtin.env', 'HOME') }}/.certbot/log"
  pre_tasks:
    # Include picluster variables
    - name: Include picluster variables
      ansible.builtin.include_vars: "vars/picluster.yml"

    - name: Check Ionos credentials file exists
      ansible.builtin.stat:
        path: "{{ ionos_credentials_file }}"
      register: ionos_credentials_stat
      when: enable_letsencrypt

    - name: Validate Ionos credentials file exists
      ansible.builtin.assert:
        that:
          - ionos_credentials_stat.stat.exists
          - ionos_credentials_stat.stat.isreg
        fail_msg: |
          ⚠️  Ionos credentials file not found!

          Please create the credentials file before running this playbook:

            {{ ionos_credentials_file }}

          Required format:

            dns_ionos_prefix = your-ionos-public-prefix
            dns_ionos_secret = your-ionos-secret-key

          These credentials are used to generate Let's Encrypt certificates via Ionos DNS.
      when: enable_letsencrypt

    - name: Load Ionos credentials file content
      ansible.builtin.slurp:
        src: "{{ ionos_credentials_file }}"
      register: ionos_credentials_raw
      when: enable_letsencrypt

    - name: Set Ionos credentials from file
      ansible.builtin.set_fact:
        ionos_public_prefix: "{{ (ionos_credentials_content | regex_search('(?m)^\\s*dns_ionos_prefix\\s*=\\s*(\\S+)\\s*$', '\\1') | first) | default('') }}"
        ionos_secret: "{{ (ionos_credentials_content | regex_search('(?m)^\\s*dns_ionos_secret\\s*=\\s*(\\S+)\\s*$', '\\1') | first) | default('') }}"
      vars:
        ionos_credentials_content: "{{ ionos_credentials_raw.content | b64decode }}"
      when: enable_letsencrypt

    - name: Validate Ionos credentials file format
      ansible.builtin.assert:
        that:
          - ionos_public_prefix != ""
          - ionos_secret != ""
        fail_msg: |
          ⚠️  Invalid Ionos credentials file format!

          File: {{ ionos_credentials_file }}

          Required format:

            dns_ionos_prefix = your-ionos-public-prefix
            dns_ionos_secret = your-ionos-secret-key

          These credentials are used to generate Let's Encrypt certificates via Ionos DNS.
      when: enable_letsencrypt

  tasks:
    - name: Create Letsencrytp certificate for gateway
      ansible.builtin.command: |
        certbot certonly \
        --config-dir {{ certbot_config_dir }} \
        --work-dir {{ certbot_work_dir }} \
        --logs-dir {{ certbot_logs_dir }} \
        --authenticator dns-ionos \
        --dns-ionos-credentials {{ ionos_credentials_file }} \
        --dns-ionos-propagation-seconds {{ propagation_seconds }} \
        --server https://acme-v02.api.letsencrypt.org/directory \
        --agree-tos \
        --non-interactive \
        --rsa-key-size 4096 \
        -m {{ acme_issuer_email }} \
        -d {{ item }}
      register: certbot_create
      changed_when:
        - certbot_create.rc==0
        - '"Certificate not yet due for renewal; no action taken." not in certbot_create.stdout'
      when: enable_letsencrypt
      with_items:
        - "{{ gateway_hostname }}"

    - name: Output
      ansible.builtin.debug:
        var: certbot_create.results[0].stdout
