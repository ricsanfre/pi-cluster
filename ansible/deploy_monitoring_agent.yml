---
# Deploy fluentbit to get logs and prometheus metrics
- name: Deploy fluentbit and node exporter agents on external nodes (node1)
  hosts: node1
  gather_facts: true
  become: true
  vars:
    vault_secret_file: "{{ lookup('ansible.builtin.env', 'HOME') }}/.secrets/vault.env"
  pre_tasks:
    # Include picluster variables
    - name: Include picluster variables
      ansible.builtin.include_vars: "vars/picluster.yml"
      tags: ["always"]

    - name: Check Vault secret file exists on controller
      ansible.builtin.stat:
        path: "{{ vault_secret_file }}"
      register: vault_secret_file_stat
      delegate_to: localhost
      become: false

    - name: Validate Vault secret file exists
      ansible.builtin.assert:
        that:
          - vault_secret_file_stat.stat.exists
          - vault_secret_file_stat.stat.isreg
        fail_msg: |
          Vault secret file not found: {{ vault_secret_file }}

          Run external services stage 1 first to generate it, or create it with:

            VAULT_ADDR=https://vault.example.com:8200
            VAULT_TOKEN=s.xxxxxxxxxxxxx
            VAULT_CACERT=/path/to/certificates/CA.pem

    - name: Get Vault environment from secret file
      ansible.builtin.set_fact:
        vault_addr: "{{ lookup('ansible.builtin.ini', 'VAULT_ADDR type=properties file=' ~ vault_secret_file) }}"
        vault_token: "{{ lookup('ansible.builtin.ini', 'VAULT_TOKEN type=properties file=' ~ vault_secret_file) }}"
        vault_cacert: "{{ lookup('ansible.builtin.ini', 'VAULT_CACERT type=properties file=' ~ vault_secret_file, errors='ignore') | default('', true) }}"

    - name: Validate Vault variables loaded from secret file
      ansible.builtin.assert:
        that:
          - vault_addr is defined and vault_addr != ""
          - vault_token is defined and vault_token != ""
        fail_msg: |
          ⚠️  Missing VAULT_ADDR or VAULT_TOKEN in {{ vault_secret_file }}

          Please configure Vault access before running this playbook.

    # ON-DEMAND VAULT LOOKUP: Fetch Fluentd credentials
    - name: Fetch Fluentd credentials from Vault (on-demand lookup)
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_addr }}"
        token: "{{ vault_token }}"
        validate_certs: "{{ not (enable_letsencrypt | default(false)) }}"
        ca_cert: "{{ vault_cacert | default(omit) }}"
        mount_point: "secret"
        path: "fluent/shared-key"
      register: fluentd_vault_secret
      no_log: true

    - name: Set Fluentd shared key from Vault
      ansible.builtin.set_fact:
        fluentd_shared_key: "{{ (fluentd_vault_secret.secret | default({})).get('shared-key', '') | default('', true) }}"
      no_log: true

    - name: Validate Fluentd credentials were retrieved from Vault
      ansible.builtin.assert:
        that:
          - fluentd_shared_key is defined
          - fluentd_shared_key | length > 0
        fail_msg: |
          ⚠️  Failed to retrieve Fluentd credentials from Vault!

          The fluentd_shared_key is missing or empty.

          Please verify:
          1. Vault is accessible at: {{ vault_addr }}
          2. Secret exists at path: secret/fluent/shared-key
          3. Secret contains: shared-key

          To check the secret:
            vault kv get secret/fluent/shared-key
        success_msg: "✓ Fluentd credentials successfully retrieved from Vault"

  collections:
    - prometheus.prometheus
  roles:
    - role: ricsanfre.fluentbit
    - role: prometheus.prometheus.node_exporter
# Deploy bind exporter to get bind9 metrics
- name: Deploy bind exporter agents on dns server (node1)
  hosts: dns
  gather_facts: true
  become: true
  pre_tasks:
    # Include picluster variables
    - name: Include picluster variables
      ansible.builtin.include_vars: "vars/picluster.yml"
      tags: ["always"]
  collections:
    - prometheus.prometheus
  roles:
    - role: prometheus.prometheus.bind_exporter
