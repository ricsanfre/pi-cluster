---
# Cluster External Services Deployment - Complete Automation
#
# This playbook orchestrates the complete deployment of cluster external services:
# 1. Deploy Vault Server (install, unseal, configure)
# 2. Configure Vault with Terraform (KV engine, policies, auto-generated secrets)
# 3. Deploy MinIO server using Vault secrets
# 4. Configure MinIO resources (buckets, users, policies)
# 5. Load external services keys and credentials (DDNS, MinIO Prometheus bearer token)
#
# Stage delegation:
#   - Stage 2 logic is implemented in configure_vault.yml
#   - Stage 4 logic is implemented in configure_minio.yml
#   - Stage 5 logic is implemented in load_external_services_keys.yml
#
# Prerequisites:
#   - inventory.yml configured with [vault] and [s3] groups
#   - Terraform installed on localhost
#   - Vault environment file (generated by deploy_vault.yml stage):
#     * ~/.secrets/vault.env
#   - IONOS credentials file for Let's Encrypt (if enabled):
#     * ~/.secrets/ionos-credentials.ini
#
# Post-Deployment:
#   Vault variables are read from ~/.secrets/vault.env for stages 2-5.
#   File format:
#   - VAULT_ADDR='https://vault.example.com:8200'
#   - VAULT_TOKEN='s.xxxxxxxxxxxxx'
#   - VAULT_CACERT='/path/to/certificates/CA.pem'
#
# Usage:
#   # Full deployment
#   ansible-playbook ansible/external_services.yml
#
#   # Skip specific stages with tags
#   ansible-playbook ansible/external_services.yml --skip-tags terraform
#   ansible-playbook ansible/external_services.yml --skip-tags minio
#
#   # Run only specific stages
#   ansible-playbook ansible/external_services.yml --tags vault
#   ansible-playbook ansible/external_services.yml --tags terraform
#   ansible-playbook ansible/external_services.yml --tags stage4
#   ansible-playbook ansible/external_services.yml --tags stage5
#   ansible-playbook ansible/external_services.yml --tags credentials
#
#   # Stage-to-playbook mapping
#   # stage1 -> deploy_vault.yml
#   # stage2 -> configure_vault.yml
#   # stage3 -> deploy_minio.yml
#   # stage4 -> configure_minio.yml
#   # stage5 -> load_external_services_keys.yml

- name: "Stage 1: Deploy HashiCorp Vault Server"
  ansible.builtin.import_playbook: deploy_vault.yml
  tags: [vault, stage1]

- name: "Stage 2: Configure Vault with Terraform"
  ansible.builtin.import_playbook: configure_vault.yml
  vars:
    enable_kubernetes_auth: false
  tags: [terraform, stage2]

- name: "Stage 3: Deploy MinIO with Vault Secrets"
  ansible.builtin.import_playbook: deploy_minio.yml
  tags: [minio, stage3]

- name: "Stage 4: Configure MinIO Resources"
  ansible.builtin.import_playbook: configure_minio.yml
  tags: [minio, terraform, stage4]

- name: "Stage 5: Load External Services Keys and Credentials"
  ansible.builtin.import_playbook: load_external_services_keys.yml
  tags: [credentials, stage5]

- name: "Deployment Complete - Summary"
  hosts: localhost
  gather_facts: false
  tags: [always]
  tasks:
    - name: Display deployment completion banner
      ansible.builtin.debug:
        msg: |
          ╔════════════════════════════════════════════════════════════╗
          ║   Cluster External Services Deployment Complete!           ║
          ╚════════════════════════════════════════════════════════════╝

          All stages completed successfully.

          Summary:
            - Stage 1: Vault Server deployed and unsealed
            - Stage 2: Terraform configuration applied
            - Stage 3: MinIO server deployed with Vault integration
            - Stage 4: MinIO resources configured
            - Stage 5: Remaining credentials loaded

          Vault Access:
            VAULT_ADDR={{ hostvars['localhost']['vault_external_services_addr'] | default('(check vault host)') }}
            VAULT_TOKEN={{ (hostvars['localhost']['vault_external_services_token'] | default(''))[:20] }}...

          Verify Setup:

            # Export environment
            export VAULT_ADDR='{{ hostvars['localhost']['vault_external_services_addr'] | default('https://vault.example.com:8200') }}'
            export VAULT_TOKEN='{{ hostvars['localhost']['vault_external_services_token'] | default('s.xxxxxxxxxxxxx') }}'
            export VAULT_CACERT='{{ hostvars['localhost']['vault_external_services_cacert'] | default('/path/to/CA.pem') }}'

            # List all secrets
            vault kv list secret/

            # View specific secrets
            vault kv get secret/minio
            vault kv get secret/bind9/ddns
            vault kv get secret/kubernetes/cluster

          Secret Locations:
            - Auto-generated secrets: secret/* (from Terraform)
            - MinIO credentials: secret/minio
            - IONOS credentials: secret/certmanager/ionos
            - GitHub credentials: secret/flux/github-pat
            - Kubernetes config: secret/kubernetes/cluster
            - Bind9 DDNS: secret/bind9/ddns
            - HTTP Auth: secret/ingress/basic-auth
            - MinIO monitoring: secret/minio/prometheus

          Next Steps:
            1. Store Vault credentials securely
            2. Use these credentials in subsequent playbooks
            3. Deploy Kubernetes: make k3s-install
            4. Configure applications to use Vault lookups

          For future playbook runs, ensure this file exists:
            ~/.secrets/vault.env
