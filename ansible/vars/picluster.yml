---
# Pi Cluster variables

#######
# K3S #
#######

# k3s version
# renovate: datasource=github-releases depName=k3s-io/k3s
k3s_version: v1.35.4+k3s1

# k3s master node VIP (loadbalancer)
k3s_api_vip: 10.0.0.10

# k3s shared token
# NOTE: Token is fetched on-demand from Vault in k3s_install.yml
# k3s_token: "{{ vault.cluster.k3s.token }}"

# k3s config directory
k3s_config_directory: /etc/rancher/k3s

# kubelet configuration
k3s_kubelet_config: |
  apiVersion: kubelet.config.k8s.io/v1beta1
  kind: KubeletConfiguration
  shutdownGracePeriod: 30s
  shutdownGracePeriodCriticalPods: 10s


# k3s server-config
# Equivalent to start master installer with the following options
# --write-kubeconfig-mode '0644'
# --flannel-backend=none
# --disable-kube-proxy
# --disable-network-policy
# --disable-helm-controller
# --disable 'servicelb'
# --disable 'traefik'
# --disable 'local-storage'
# --disable 'coredns'
# --node-taint 'node-role.kubernetes.io/control-plane:NoSchedule'
# --kube-controller-manager-arg 'bind-address=0.0.0.0'
# --kube-proxy-arg 'metrics-bind-address=0.0.0.0'
# --kube-scheduler-arg 'bind-address=0.0.0.0'
# --kubelet-arg 'config=/etc/rancher/k3s/kubelet.config'
# --kube-controller-manager-arg 'terminated-pod-gc-threshold=10'

k3s_server_config:
  # Disable Flannel CNI
  flannel-backend: none
  disable-network-policy: true
  # Disable Helm Controller
  disable-helm-controller: true
  # Disable kube-proxy (using cilium kube-proxy replacement)
  disable-kube-proxy: true
  # Enabling Embedded Registry Mirror (Spegel)
  embedded-registry: true
  # TLS config
  tls-san:
    - "{{ k3s_api_vip }}"  # IP to HAProxy
  # Disable K3s addons: coredns, local path, servicelb, traefik and metric-server
  disable:
    - coredns
    - local-storage
    - servicelb
    - traefik
    - metrics-server
  write-kubeconfig-mode: 644
  node-taint:
    - 'node-role.kubernetes.io/control-plane:NoSchedule'
  etcd-expose-metrics: true
  kubelet-arg:
    - 'config=/etc/rancher/k3s/kubelet.config'
  # kube-proxy-arg:
  #  - 'metrics-bind-address=0.0.0.0'
  kube-controller-manager-arg:
    - 'bind-address=0.0.0.0'
    - 'terminated-pod-gc-threshold=10'
  kube-scheduler-arg:
    - 'bind-address=0.0.0.0'

# k3s agent-config
# Equivalent to start agent installer with the following options
#  --node-label 'node_type=worker'
#  --kubelet-arg 'config=/etc/rancher/k3s/kubelet.config'
#  --kube-proxy-arg 'metrics-bind-address=0.0.0.0'
k3s_agent_config:
  node-label:
    - 'node_type=worker'
  kubelet-arg:
    - 'config=/etc/rancher/k3s/kubelet.config'
#  kube-proxy-arg:
#    - 'metrics-bind-address=0.0.0.0'

k3s_registries:
  mirrors:
    "*":


#################################
# TLS Certificates: LetsEncrypt #
#################################

# Enable letsencrypt certificates
enable_letsencrypt: true

# IONOS API credentials
# NOTE: Credentials are loaded from environment variables (IONOS_PUBLIC_PREFIX, IONOS_SECRET)
# in deploy_vault.yml and deploy_minio.yml, not from these variables
# ionos_public_prefix: "{{ vault.certmanager.ionos.public_prefix }}"
# ionos_secret: "{{ vault.certmanager.ionos.secret }}"
ionos_api_endpoint: https://api.hosting.ionos.com


# issuer email
acme_issuer_email: admin@ricsanfre.com

##########################
# Minio S3 configuration #
##########################

# Minio S3 Server
minio_hostname: "object-store.homelab.ricsanfre.com"
minio_endpoint: "{{ minio_hostname }}:9091"
minio_url: "https://{{ minio_hostname }}:9091"

# renovate: datasource=github-releases depName=minio/minio versioning=regex:^RELEASE\.(?<major>\d{4})-(?<minor>\d{2})-(?<patch>\d{2})T(?<build>\d{2}-\d{2}-\d{2})Z?$
minio_server_version: RELEASE.2025-09-07T16-13-09Z
# renovate: datasource=github-releases depName=minio/mc versioning=regex:^RELEASE\.(?<major>\d{4})-(?<minor>\d{2})-(?<patch>\d{2})T(?<build>\d{2}-\d{2}-\d{2})Z?$
minio_mc_version: RELEASE.2025-08-13T08-35-41Z

# Minio data dirs
minio_server_make_datadirs: true
minio_server_datadirs:
  - /storage/minio

# Minio admin credentials
# NOTE: Credentials are loaded from Vault on-demand in deploy_minio.yml
# minio_root_user: "root"
# minio_root_password: "{{ vault.minio.root.key }}"

# Minio site region configuration
minio_site_region: "eu-west-1"

# Enabling TLS
minio_enable_tls: true
minio_validate_certificate: false

# Create Prometheus bearer token
minio_prometheus_bearer_token: true

########################
# Restic configuration #
########################

# renovate: datasource=github-releases depName=restic/restic
restic_version: 0.18.1

# Restic S3 repository configuration
restic_repository: "s3:{{ minio_url }}/restic"
restic_use_ca_cert: true
# Restic AWS credentials
# NOTE: Credentials are managed by Terraform (terraform/minio)
# and fetched on-demand from Vault in backup_configuration.yml
# restic_environment:
#   - name: AWS_ACCESS_KEY_ID
#     value: "{{ vault.minio.restic.user }}"
#   - name: AWS_SECRET_ACCESS_KEY
#     value: "{{ vault.minio.restic.key }}"

#######################
# Vault configuration #
#######################

vault_hostname: "vault.{{ dns_domain }}"
# renovate: datasource=github-releases depName=hashicorp/vault
vault_version: 2.0.0

vault_dns: "{{ vault_hostname }}"
vault_enable_tls: true
custom_ca: false
vault_init: true
vault_unseal: true
vault_unseal_service: true
tls_skip_verify: "{{ not enable_letsencrypt }}"

# Enable Prometheus integration
vault_custom_configuration: |
  ui = true

  telemetry {
    disable_hostname = true
    prometheus_retention_time = "12h"
  }

#########################
# Utils/CLI versions    #
#########################

# renovate: datasource=github-releases depName=fluxcd/flux2
fluxcd_version: v2.8.6

# renovate: datasource=github-releases depName=vmware-tanzu/velero
velero_version: v1.18.0

# renovate: datasource=github-releases depName=longhorn/longhorn
longhorn_version: v1.11.1

# renovate: datasource=github-releases depName=istio/istio
istio_version: 1.29.2

# renovate: datasource=github-releases depName=helm/helm
helm_version: v4.1.4


#######################
# Gateway configuration
#######################

gateway_hostname: "gateway.{{ dns_domain }}"
