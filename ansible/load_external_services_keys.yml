---
- name: "Stage 4: Load Remaining Credentials"
  hosts: vault
  gather_facts: true
  tags: [credentials, stage4]
  become: false

  vars:
    vault_host: "{{ groups['vault'][0] }}"
    ionos_credentials_file: "~/.secrets/ionos-credentials.ini"
    github_pat_file: "~/.secrets/github-pat.ini"
    vault_secret_file: "{{ lookup('ansible.builtin.env', 'HOME') }}/.secrets/vault.env"

  tasks:
    - name: Display Stage 4 banner
      ansible.builtin.debug:
        msg: |
          ╔════════════════════════════════════════════════════════════╗
          ║      Stage 4: Load Remaining Credentials                   ║
          ╚════════════════════════════════════════════════════════════╝

          This stage will load credentials not auto-generated by Terraform:
          • IONOS DNS API credentials (from filesystem)
          • GitHub PAT credentials (from filesystem)
          • Bind9 DDNS key (from filesystem)
          • MinIO Prometheus bearer token (from filesystem)
          • HTTP Basic Auth credentials
          • General Ansible variables

    - name: Include picluster variables
      ansible.builtin.include_vars: "vars/picluster.yml"

    - name: Include picluster variables
      ansible.builtin.include_vars: "vars/picluster.yml"

    - name: Check Vault secret file exists on controller
      ansible.builtin.stat:
        path: "{{ vault_secret_file }}"
      register: vault_secret_file_stat
      delegate_to: localhost
      become: false
      run_once: true

    - name: Validate Vault secret file exists
      ansible.builtin.assert:
        that:
          - vault_secret_file_stat.stat.exists
          - vault_secret_file_stat.stat.isreg
        fail_msg: |
          Vault secret file not found: {{ vault_secret_file }}

          Run Stage 1 first to generate it.
      run_once: true

    - name: Get Vault environment from secret file
      ansible.builtin.set_fact:
        vault_addr: "{{ lookup('ansible.builtin.ini', 'VAULT_ADDR type=properties file=' ~ vault_secret_file) }}"
        vault_token: "{{ lookup('ansible.builtin.ini', 'VAULT_TOKEN type=properties file=' ~ vault_secret_file) }}"
        vault_cacert: "{{ lookup('ansible.builtin.ini', 'VAULT_CACERT type=properties file=' ~ vault_secret_file, errors='ignore') | default('', true) }}"

    - name: Validate Vault environment variables
      ansible.builtin.assert:
        that:
          - vault_addr is defined and vault_addr != ""
          - vault_token is defined and vault_token != ""
        fail_msg: |
          Vault environment variables not found!

          Please set them manually if running this stage standalone:

          export VAULT_ADDR='https://vault.example.com:8200'
          export VAULT_TOKEN='s.xxxxxxxxxxxxx'
          export VAULT_CACERT='/path/to/certificates/CA.pem'

    - name: Install required system packages
      ansible.builtin.package:
        name:
          - python3-pip
          - python3-virtualenv
          - python3-setuptools
        state: present
      become: true

    - name: Install hvac Python library
      ansible.builtin.pip:
        name: hvac
        state: present
      become: true

    - name: Load general Ansible variables into Vault
      community.hashi_vault.vault_write:
        path: "secret/ansible/general"
        data:
          ansible_user: "{{ ansible_user | default('ricsanfre') }}"
          custom_ca: "{{ custom_ca | default(false) }}"
          enable_letsencrypt: "{{ enable_letsencrypt | default(false) }}"
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_CACERT: "{{ vault_cacert if not enable_letsencrypt else '' }}"

    - name: Load HTTP Basic Authentication credentials
      block:
        - name: Include HTTP Basic Authentication credential tasks
          ansible.builtin.include_tasks:
            file: tasks/create_basic_auth_credentials.yml
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_CACERT: "{{ vault_cacert if not enable_letsencrypt else '' }}"

    - name: Load MinIO Prometheus bearer token
      block:
        - name: Include MinIO Prometheus bearer token tasks
          ansible.builtin.include_tasks:
            file: tasks/create_minio_bearer_token.yml
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_CACERT: "{{ vault_cacert if not enable_letsencrypt else '' }}"

    - name: Load IONOS credentials
      block:
        - name: Include IONOS credentials tasks
          ansible.builtin.include_tasks:
            file: tasks/load_ionos_credentials_into_vault.yml
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_CACERT: "{{ vault_cacert if not enable_letsencrypt else '' }}"

    - name: Load GitHub PAT credentials
      when: git_private_repo | default(false)
      block:
        - name: Include GitHub PAT credentials tasks
          ansible.builtin.include_tasks:
            file: tasks/load_github_pat_into_vault.yml
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_CACERT: "{{ vault_cacert if not enable_letsencrypt else '' }}"

    - name: Load Bind9 DDNS key
      block:
        - name: Include Bind9 DDNS key tasks
          ansible.builtin.include_tasks:
            file: tasks/load_ddns_key_into_vault.yml
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_CACERT: "{{ vault_cacert }}"
