---
- name: Bootstrap Cluster
  hosts: localhost
  gather_facts: false
  become: false

  environment:
    # The location of the kubeconfig file on the primary server.
    K8S_AUTH_KUBECONFIG: ~/.kube/config

  pre_tasks:
    # Install Python PIP and jq utility packages
    - name: Ensure required packages are installed.
      ansible.builtin.package:
        name:
          - python3-pip
          - python3-setuptools
          - jq
        state: present
      become: true
    # Install kubernetes python packages (Ansible kubernetes collection dependency)
    - name: Ensure kubernetes Python library is installed.
      ansible.builtin.pip:
        name: kubernetes
        state: present
      become: true
    # Install HashiCorp python packages (Ansible vault module dependency)
    - name: Ensure HashiCorp vault python library is installed.
      ansible.builtin.pip:
        name: hvac
        state: present
      become: true

    - name: Include vault variables
      ansible.builtin.include_vars: vars/vault.yaml

    - name: Include rdxcluster variables
      ansible.builtin.include_vars: vars/rdxcluster.yaml

  tasks:
    - name: Set overlay to prod in case not defined by an input argument
      ansible.builtin.set_fact:
        overlay: prod
      when: overlay is undefined

    - name: Install cilium and coreDNS # noqa: no-changed-when
      become: false
      ansible.builtin.shell: |
        set -o pipefail
        helmfile --quiet --file ../kubernetes/clusters/bootstrap/helmfile.yaml apply \
        --skip-diff-on-install --suppress-diff --concurrency 1
      args:
        executable: /bin/bash
      register: output

    - name: Config Cilium CNI
      ansible.builtin.include_tasks: tasks/cilium_config.yaml

    - name: Configure Vault integration
      ansible.builtin.include_tasks: tasks/configure_vault_integration.yaml

    - name: Flux bootstrap
      ansible.builtin.include_tasks: tasks/fluxcd_bootstrap.yaml

    - name: Install cli utils.
      ansible.builtin.include_tasks: tasks/install_cli_utils.yaml
