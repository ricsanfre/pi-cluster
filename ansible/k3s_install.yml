- name: Label K3S worker nodes
  hosts: k3s_master
  tags: [config]
  pre_tasks:
    - name: Include picluster variables
      ansible.builtin.include_vars: "vars/picluster.yml"
  tasks:
    # - name: "Wait for worker nodes to be ready"
    #   command:
    #     cmd: "kubectl get nodes {{ item }}"
    #   register: nodes
    #   until:
    #     - '" Ready "  in nodes.stdout'
    #   retries: 10
    #   delay: 5
    #   with_items: "{{ groups['k3s_worker'] }}"

    - name: Label k3s worker nodes
      ansible.builtin.command:
        cmd: "kubectl label nodes {{ item }} kubernetes.io/role=worker"
      run_once: true
      with_items: "{{ groups['k3s_worker'] }}"

- name: Get Kubernets config file
  hosts: k3s_master
  tags: [kube-config]
  pre_tasks:
    - name: Include picluster variables
      ansible.builtin.include_vars: "vars/picluster.yml"
  tasks:
    - name: Get k3s config file
      run_once: true
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_base64

    - name: Write Kubernetes config file with the correct cluster address
      ansible.builtin.copy:
        content: "{{ kubeconfig_base64.content | b64decode | replace('127.0.0.1', k3s_api_vip) }}"
        dest: "~/.kube/config"
        mode: "0600"
      delegate_to: localhost
      run_once: true

- name: Install Cilium CNI and CoreDNS
  hosts: localhost
  tags: [install, cni]
  gather_facts: false
  become: false
  pre_tasks:
    - name: Include picluster variables
      ansible.builtin.include_vars: "vars/picluster.yml"
  tasks:

    - name: Set overlay to prod in case not defined by an input argument
      ansible.builtin.set_fact:
        overlay: "prod"
      when: overlay is undefined

    # - name: Install cilium and coreDNS
