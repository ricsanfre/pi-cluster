---
- name: Stage 1 - Destroy MinIO Terraform resources
  hosts: localhost
  gather_facts: false
  tags: [terraform, s3, stage1]
  vars:
    terraform_minio_dir: "../terraform/minio"
    terraform_minio_state_dir: "{{ terraform_minio_dir }}/.terraform"
    terraform_minio_state_file: "{{ terraform_minio_dir }}/terraform.tfstate"
    vault_secret_file: "{{ lookup('ansible.builtin.env', 'HOME') }}/.secrets/vault.env"

  pre_tasks:
    - name: Stage 1 banner
      ansible.builtin.debug:
        msg: "===== Stage 1/5: Destroy MinIO Terraform resources ====="

    - name: Include picluster variables
      ansible.builtin.include_vars: "vars/picluster.yml"

    - name: Check Vault secret file exists
      ansible.builtin.stat:
        path: "{{ vault_secret_file }}"
      register: vault_secret_file_stat

    - name: Validate Vault secret file exists
      ansible.builtin.assert:
        that:
          - vault_secret_file_stat.stat.exists
          - vault_secret_file_stat.stat.isreg
        fail_msg: |
          Vault secret file not found: {{ vault_secret_file }}

          Run external services stage 1 first to generate it, or create it with:

            VAULT_ADDR=https://vault.example.com:8200
            VAULT_TOKEN=s.xxxxxxxxxxxxx
            VAULT_CACERT=/path/to/certificates/CA.pem

    - name: Get Vault environment from secret file
      ansible.builtin.set_fact:
        vault_addr: "{{ lookup('ansible.builtin.ini', 'VAULT_ADDR type=properties file=' ~ vault_secret_file) }}"
        vault_token: "{{ lookup('ansible.builtin.ini', 'VAULT_TOKEN type=properties file=' ~ vault_secret_file) }}"
        vault_cacert: "{{ lookup('ansible.builtin.ini', 'VAULT_CACERT type=properties file=' ~ vault_secret_file, errors='ignore') | default('', true) }}"

    - name: Validate Vault variables loaded from secret file
      ansible.builtin.assert:
        that:
          - vault_addr is defined and vault_addr != ""
          - vault_token is defined and vault_token != ""
        fail_msg: |
          Missing VAULT_ADDR or VAULT_TOKEN in {{ vault_secret_file }}

    - name: Fetch MinIO credentials from Vault
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_addr }}"
        token: "{{ vault_token }}"
        validate_certs: "{{ not (enable_letsencrypt | default(false)) }}"
        ca_cert: "{{ vault_cacert | default(omit) }}"
        mount_point: "secret"
        path: "minio/root"
      register: minio_vault_secret
      no_log: true

    - name: Set MinIO credentials from Vault
      ansible.builtin.set_fact:
        minio_root_user: "{{ (minio_vault_secret.secret | default({})).username | default('', true) }}"
        minio_root_password: "{{ (minio_vault_secret.secret | default({})).key | default('', true) }}"
      no_log: true

    - name: Validate MinIO credentials were retrieved from Vault
      ansible.builtin.assert:
        that:
          - minio_root_user is defined
          - minio_root_user | length > 0
          - minio_root_password is defined
          - minio_root_password | length > 0
        fail_msg: |
          Failed to retrieve MinIO credentials from Vault at path secret/minio/root
          Please ensure the secret exists and contains keys: username, key

  tasks:
    - name: Check MinIO Terraform state directory
      ansible.builtin.stat:
        path: "{{ terraform_minio_state_dir }}"
      register: minio_tf_state_dir

    - name: Check MinIO Terraform state file
      ansible.builtin.stat:
        path: "{{ terraform_minio_state_file }}"
      register: minio_tf_state_file

    - name: Skip MinIO Terraform destroy when state directory is missing
      ansible.builtin.debug:
        msg: "Skipping MinIO Terraform destroy because {{ terraform_minio_state_dir }} does not exist"
      when: not minio_tf_state_dir.stat.exists

    - name: Skip MinIO Terraform destroy when state file is missing
      ansible.builtin.debug:
        msg: "Skipping MinIO Terraform destroy because {{ terraform_minio_state_file }} does not exist"
      when: not minio_tf_state_file.stat.exists

    - name: Initialize MinIO Terraform project
      ansible.builtin.command:
        cmd: tofu init -no-color
        chdir: "{{ terraform_minio_dir }}"
      changed_when: false
      when:
        - minio_tf_state_dir.stat.exists
        - minio_tf_state_file.stat.exists

    - name: Destroy MinIO Terraform resources
      ansible.builtin.command:
        cmd: tofu destroy -no-color -auto-approve
        chdir: "{{ terraform_minio_dir }}"
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_CACERT: "{{ vault_cacert if (not enable_letsencrypt | default(false)) else '' }}"
        TF_VAR_minio_endpoint: "{{ minio_endpoint }}"
        TF_VAR_minio_use_ssl: "true"
        TF_VAR_minio_ssl_verify: "true"
        TF_VAR_minio_admin_user: "{{ minio_root_user }}"
        TF_VAR_minio_admin_password: "{{ minio_root_password }}"
        TF_VAR_vault_address: "{{ vault_addr }}"
        TF_VAR_vault_token: "{{ vault_token }}"
      register: terraform_minio_destroy
      changed_when: "'Destroy complete!' in terraform_minio_destroy.stdout"
      no_log: false
      when:
        - minio_tf_state_dir.stat.exists
        - minio_tf_state_file.stat.exists

- name: Stage 2 - Clean Minio Installation
  hosts: s3
  become: true
  gather_facts: false
  tags: [s3, stage2]
  tasks:
    - name: Stage 2 banner
      ansible.builtin.debug:
        msg: "===== Stage 2/5: Clean MinIO installation ====="

    - name: Stop and disable Minio Server
      ansible.builtin.systemd:
        name: minio
        state: stopped
        enabled: false
      become: true
    - name: Delete directories and files
      become: true
      ansible.builtin.file:
        state: absent
        path: "{{ item }}"
      with_items:
        - /storage/minio/
        - /etc/minio/
        - /usr/local/bin/minio
        - /usr/local/bin/mc
        - /etc/systemd/system/minio.service
        - ~/.mc
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

- name: Stage 3 - Destroy Vault Terraform resources
  hosts: localhost
  gather_facts: false
  tags: [terraform, vault, stage3]
  vars:
    terraform_vault_dir: "../terraform/vault"
    terraform_vault_state_dir: "{{ terraform_vault_dir }}/.terraform"
    terraform_vault_state_file: "{{ terraform_vault_dir }}/terraform.tfstate"
    vault_secret_file: "{{ lookup('ansible.builtin.env', 'HOME') }}/.secrets/vault.env"

  pre_tasks:
    - name: Stage 3 banner
      ansible.builtin.debug:
        msg: "===== Stage 3/5: Destroy Vault Terraform resources ====="

    - name: Include picluster variables
      ansible.builtin.include_vars: "vars/picluster.yml"

    - name: Check Vault secret file exists
      ansible.builtin.stat:
        path: "{{ vault_secret_file }}"
      register: vault_secret_file_stat

    - name: Validate Vault secret file exists
      ansible.builtin.assert:
        that:
          - vault_secret_file_stat.stat.exists
          - vault_secret_file_stat.stat.isreg
        fail_msg: |
          Vault secret file not found: {{ vault_secret_file }}

          Run external services stage 1 first to generate it, or create it with:

            VAULT_ADDR=https://vault.example.com:8200
            VAULT_TOKEN=s.xxxxxxxxxxxxx
            VAULT_CACERT=/path/to/certificates/CA.pem

    - name: Get Vault environment from secret file
      ansible.builtin.set_fact:
        vault_addr: "{{ lookup('ansible.builtin.ini', 'VAULT_ADDR type=properties file=' ~ vault_secret_file) }}"
        vault_token: "{{ lookup('ansible.builtin.ini', 'VAULT_TOKEN type=properties file=' ~ vault_secret_file) }}"
        vault_cacert: "{{ lookup('ansible.builtin.ini', 'VAULT_CACERT type=properties file=' ~ vault_secret_file, errors='ignore') | default('', true) }}"

    - name: Validate Vault variables loaded from secret file
      ansible.builtin.assert:
        that:
          - vault_addr is defined and vault_addr != ""
          - vault_token is defined and vault_token != ""
        fail_msg: |
          Missing VAULT_ADDR or VAULT_TOKEN in {{ vault_secret_file }}

  tasks:
    - name: Check Vault Terraform state directory
      ansible.builtin.stat:
        path: "{{ terraform_vault_state_dir }}"
      register: vault_tf_state_dir

    - name: Check Vault Terraform state file
      ansible.builtin.stat:
        path: "{{ terraform_vault_state_file }}"
      register: vault_tf_state_file

    - name: Skip Vault Terraform destroy when state directory is missing
      ansible.builtin.debug:
        msg: "Skipping Vault Terraform destroy because {{ terraform_vault_state_dir }} does not exist"
      when: not vault_tf_state_dir.stat.exists

    - name: Skip Vault Terraform destroy when state file is missing
      ansible.builtin.debug:
        msg: "Skipping Vault Terraform destroy because {{ terraform_vault_state_file }} does not exist"
      when: not vault_tf_state_file.stat.exists

    - name: Initialize Vault Terraform project
      ansible.builtin.command:
        cmd: tofu init -no-color
        chdir: "{{ terraform_vault_dir }}"
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_CACERT: "{{ vault_cacert if (not enable_letsencrypt | default(false)) else '' }}"
        TF_VAR_vault_address: "{{ vault_addr }}"
        TF_VAR_vault_token: "{{ vault_token }}"
      changed_when: false
      when:
        - vault_tf_state_dir.stat.exists
        - vault_tf_state_file.stat.exists

    - name: Destroy Vault Terraform resources
      ansible.builtin.command:
        cmd: >-
          tofu destroy
          -no-color
          -auto-approve
          -var="enable_kubernetes_auth=false"
          -var="enable_policies=true"
          -var="enable_roles=true"
          -var="enable_secrets=true"
        chdir: "{{ terraform_vault_dir }}"
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_TOKEN: "{{ vault_token }}"
        VAULT_CACERT: "{{ vault_cacert if (not enable_letsencrypt | default(false)) else '' }}"
        TF_VAR_vault_address: "{{ vault_addr }}"
        TF_VAR_vault_token: "{{ vault_token }}"
      register: terraform_vault_destroy
      changed_when: "'Destroy complete!' in terraform_vault_destroy.stdout"
      when:
        - vault_tf_state_dir.stat.exists
        - vault_tf_state_file.stat.exists

- name: Stage 4 - Clean Vault Installation
  hosts: vault
  become: true
  gather_facts: false
  tags: [vault, stage4]
  tasks:
    - name: Stage 4 banner
      ansible.builtin.debug:
        msg: "===== Stage 4/5: Clean Vault installation ====="

    - name: Stop and disable Vault Server
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      become: true
      with_items:
        - vault
        - vault-unseal
    - name: Delete directories and files
      become: true
      ansible.builtin.file:
        state: absent
        path: "{{ item }}"
      with_items:
        - /var/lib/vault/
        - /etc/vault/
        - /var/log/vault/
        - /usr/local/bin/vault
        - /etc/systemd/system/vault.service
        - /etc/systemd/system/vault-unseal.service
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

- name: Stage 5 - Clean Restic Installation
  hosts: picluster
  become: true
  gather_facts: false
  tags: [restic, stage5]
  tasks:
    - name: Stage 5 banner
      ansible.builtin.debug:
        msg: "===== Stage 5/5: Clean Restic installation ====="

    - name: Stop and disable restic backup service
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      become: true
      with_items:
        - restic-backup.timer

    - name: Stop and disable restic clean service
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      become: true
      when: restic_clean_service
      with_items:
        - restic-clean.timer

    - name: Delete directories and files
      become: true
      ansible.builtin.file:
        state: absent
        path: "{{ item }}"
      with_items:
        - /etc/restic/
        - /var/log/restic.log
        - /usr/local/bin/restic
        - /etc/systemd/system/restic-backup.service
        - /etc/systemd/system/restic-backup.timer

    - name: Delete clean service file
      become: true
      ansible.builtin.file:
        state: absent
        path: "{{ item }}"
      with_items:
        - /etc/systemd/system/restic-clean.timer
        - /etc/systemd/system/restic-clean.service
      when: restic_clean_service

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
